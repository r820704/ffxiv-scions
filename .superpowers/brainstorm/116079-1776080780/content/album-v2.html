<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文理技能圖鑑 Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12101c;
    color: #e8e0d0;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 24px;
    min-height: 100vh;
  }

  .header {
    max-width: 640px;
    margin: 0 auto 16px;
  }
  .header h1 {
    font-size: 20px;
    color: #C5B69D;
    margin-bottom: 8px;
  }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .progress-bar {
    flex: 1;
    background: #252040;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #A57B18, #C5B69D);
    border-radius: 4px;
    transition: width 0.3s;
  }
  .progress-text {
    color: #8a7e6a;
    font-size: 13px;
    white-space: nowrap;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    max-width: 640px;
    margin: 0 auto;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 2px solid #2a2440;
    background: #1a1528;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, opacity 0.2s, transform 0.15s;
    overflow: hidden;
  }
  .cell:hover {
    transform: scale(1.08);
    z-index: 10;
  }

  /* Unlocked state */
  .cell.unlocked {
    border-color: #A57B18;
    opacity: 1;
  }
  .cell.unlocked:hover {
    border-color: #C5B69D;
    box-shadow: 0 0 12px rgba(197, 182, 157, 0.3);
  }
  .cell.unlocked .icon {
    width: 80%;
    height: 80%;
    object-fit: contain;
    border-radius: 3px;
  }

  /* Locked state */
  .cell.locked {
    opacity: 0.4;
  }
  .cell.locked:hover {
    opacity: 0.7;
    border-color: #4a4460;
  }
  .cell.locked .lock-num {
    font-size: 16px;
    font-weight: bold;
    color: #8a7e6a;
  }
  .cell.locked .icon {
    width: 80%;
    height: 80%;
    object-fit: contain;
    border-radius: 3px;
    filter: brightness(0.2) grayscale(1);
  }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    background: #1a1528;
    border: 1px solid #A57B18;
    border-radius: 8px;
    padding: 12px;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .cell:hover .tooltip {
    display: block;
  }
  /* Bottom rows: tooltip goes above is default, but for top rows it should go below */
  .cell.tip-below .tooltip {
    bottom: auto;
    top: calc(100% + 8px);
  }
  /* Edge cells: shift tooltip */
  .cell.tip-left .tooltip {
    left: 0;
    transform: translateX(0);
  }
  .cell.tip-right .tooltip {
    left: auto;
    right: 0;
    transform: translateX(0);
  }

  .tooltip .t-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tooltip .t-icon {
    width: 36px;
    height: 36px;
    border-radius: 4px;
  }
  .tooltip .t-name {
    font-size: 14px;
    font-weight: bold;
    color: #C5B69D;
  }
  .tooltip .t-cat {
    font-size: 11px;
    color: #8a7e6a;
  }
  .tooltip .t-desc {
    font-size: 12px;
    color: #e8e0d0;
    line-height: 1.5;
    border-top: 1px solid #2a2440;
    padding-top: 8px;
  }
  .tooltip .t-recipe {
    font-size: 11px;
    color: #8a7e6a;
    border-top: 1px solid #2a2440;
    padding-top: 8px;
    margin-top: 8px;
  }
  .tooltip .t-recipe span {
    color: #C5B69D;
  }

  .hint {
    max-width: 640px;
    margin: 16px auto 0;
    font-size: 12px;
    color: #8a7e6a;
    text-align: center;
  }

  .legend {
    max-width: 640px;
    margin: 12px auto 0;
    display: flex;
    gap: 20px;
    justify-content: center;
    font-size: 11px;
    color: #8a7e6a;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }
  .legend-dot.unlocked { background: #A57B18; }
  .legend-dot.locked { background: #2a2440; opacity: 0.5; }
</style>
</head>
<body>

<div class="header">
  <h1>文理技能圖鑑</h1>
  <div class="progress-row">
    <div class="progress-bar">
      <div class="progress-fill" style="width: 21%"></div>
    </div>
    <div class="progress-text">12 / 56 已習得</div>
  </div>
</div>

<div class="grid" id="album-grid"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot unlocked"></div> 已習得</div>
  <div class="legend-item"><div class="legend-dot locked"></div> 未習得（點擊切換）</div>
</div>
<div class="hint">游標移到技能上方可查看詳細說明</div>

// Demo: randomly unlock ~12 skills
const demoUnlocked = new Set([0,1,4,5,10,14,18,28,31,35,38,51].map(i => skills[i].id));

const catColors = {
  '睿識': '#8b6cc5',
  '精神': '#4a90d9',
  '攻擊': '#d94444',
  '防禦': '#4488aa',
  '回復': '#44aa66',
  '輔助': '#d9a544',
  '移動': '#6aaa6a',
};

const grid = document.getElementById('album-grid');

skills.forEach((skill, idx) => {
  const isUnlocked = demoUnlocked.has(skill.id);
  const cell = document.createElement('div');
  cell.className = `cell ${isUnlocked ? 'unlocked' : 'locked'}`;

  // Tooltip positioning
  const row = Math.floor(idx / 10);
  const col = idx % 10;
  if (row < 2) cell.classList.add('tip-below');
  if (col < 2) cell.classList.add('tip-left');
  if (col > 7) cell.classList.add('tip-right');

  const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;

  cell.innerHTML = `
    <img class="icon" src="${iconUrl}" alt="${skill.name}" loading="lazy">
    <div class="tooltip">
      <div class="t-header">
        <img class="t-icon" src="${iconUrl}" alt="">
        <div>
          <div class="t-name">${skill.name}</div>
          <div class="t-cat" style="color:${catColors[skill.cat] || '#8a7e6a'}">${skill.cat} #${idx + 1}</div>
        </div>
      </div>
      <div class="t-desc">${skill.desc}</div>
      <div class="t-recipe">點擊查看完整配方與價格</div>
    </div>
  `;

  cell.addEventListener('click', () => {
    cell.classList.toggle('unlocked');
    cell.classList.toggle('locked');
    updateProgress();
  });

  grid.appendChild(cell);
});

function updateProgress() {
  const total = skills.length;
  const unlocked = document.querySelectorAll('.cell.unlocked').length;
  document.querySelector('.progress-fill').style.width = `${(unlocked / total) * 100}%`;
  document.querySelector('.progress-text').textContent = `${unlocked} / ${total} 已習得`;
}
</script>
</body>
</html>
