<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文理技能圖鑑 Mockup v6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #12101c; color: #e8e0d0; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
  .page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; position: relative; }
  .page::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(88,56,160,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(40,60,140,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .page > * { position: relative; z-index: 1; }
  .page-title { font-size: 22px; font-weight: 700; color: #C5B69D; margin-bottom: 16px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #1a1528; border-radius: 8px; padding: 4px; width: fit-content; }
  .tab { padding: 8px 16px; font-size: 13px; border-radius: 6px; cursor: pointer; transition: all 0.2s; color: #8a7e6a; border: none; background: none; font-family: inherit; }
  .tab:hover { color: #e8e0d0; background: rgba(37,32,64,0.5); }
  .tab.active { background: #252040; color: #C5B69D; font-weight: 500; }

  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .progress-bar { flex: 1; background: #252040; border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #A57B18, #C5B69D); border-radius: 4px; transition: width 0.3s; }
  .progress-text { color: #8a7e6a; font-size: 13px; white-space: nowrap; }

  .legend { display: flex; gap: 16px; font-size: 11px; color: #8a7e6a; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 1.5px solid; }
  .legend-dot.u { background: #A57B18; border-color: #A57B18; }
  .legend-dot.l { background: #1a1528; border-color: #2a2440; opacity: 0.5; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 24px; }
  .cell { aspect-ratio: 1; border-radius: 6px; border: 2px solid #2a2440; background: #1a1528; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: border-color 0.2s, opacity 0.2s, transform 0.15s; overflow: visible; }
  .cell:hover { transform: scale(1.08); z-index: 10; }
  .cell.unlocked { border-color: #A57B18; }
  .cell.unlocked:hover { border-color: #C5B69D; box-shadow: 0 0 12px rgba(197,182,157,0.3); }
  .cell .icon { width: 80%; height: 80%; object-fit: contain; border-radius: 3px; }
  .cell.locked { opacity: 0.4; }
  .cell.locked:hover { opacity: 0.7; border-color: #4a4460; }
  .cell.locked .icon { filter: brightness(0.25) grayscale(1); }
  .cell.unlocked::after { content: '✓'; position: absolute; bottom: 1px; right: 2px; font-size: 9px; color: #A57B18; font-weight: bold; }

  .tooltip { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); width: 280px; background: #1a1528; border: 1px solid #A57B18; border-radius: 8px; padding: 12px; z-index: 100; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
  .cell:hover .tooltip { display: block; }
  .cell.tip-below .tooltip { bottom: auto; top: calc(100% + 8px); }
  .cell.tip-left .tooltip { left: 0; transform: translateX(0); }
  .cell.tip-right .tooltip { left: auto; right: 0; transform: translateX(0); }
  .tooltip .t-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .tooltip .t-icon { width: 36px; height: 36px; border-radius: 4px; }
  .tooltip .t-name { font-size: 14px; font-weight: bold; color: #C5B69D; }
  .tooltip .t-cat { font-size: 11px; }
  .tooltip .t-desc { font-size: 12px; color: #e8e0d0; line-height: 1.5; border-top: 1px solid #2a2440; padding-top: 8px; }

  /* Two-column layout */
  .two-col { display: flex; gap: 20px; align-items: flex-start; }
  .col-left { flex: 1; min-width: 0; overflow-y: auto; max-height: 75vh; border-radius: 8px; }
  .col-left::-webkit-scrollbar { width: 6px; }
  .col-left::-webkit-scrollbar-track { background: #12101c; }
  .col-left::-webkit-scrollbar-thumb { background: #2a2440; border-radius: 3px; }
  .col-left::-webkit-scrollbar-thumb:hover { background: #3a3460; }

  .col-right { width: 300px; flex-shrink: 0; position: sticky; top: 24px; }

  /* Section titles */
  .section-title { font-size: 14px; font-weight: 600; color: #C5B69D; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #2a2440; }

  /* Recipe list */
  .recipe-list { display: flex; flex-direction: column; gap: 5px; }
  .recipe-item { background: #1a1528; border: 1px solid #2a2440; border-radius: 6px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.15s; }
  .recipe-item:hover { border-color: #4a4460; background: #201a30; }
  .recipe-item .r-icon { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; }
  .recipe-item .r-info { flex: 1; min-width: 0; }
  .recipe-item .r-name { font-size: 12px; color: #e8e0d0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recipe-item .r-mats { font-size: 10px; color: #8a7e6a; margin-top: 1px; }
  .recipe-item .r-right { text-align: right; flex-shrink: 0; }
  .recipe-item .r-price { font-size: 12px; color: #daa520; font-weight: 500; }
  .recipe-item .r-toggle { font-size: 9px; color: #8a7e6a; margin-top: 1px; }
  .recipe-item.learned { opacity: 0.4; }
  .recipe-item.learned .r-price { text-decoration: line-through; color: #8a7e6a; }
  .recipe-item.learned .r-name { color: #8a7e6a; }

  /* Right column: inventory */
  .inv-card { background: #1a1528; border: 1px solid #2a2440; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .inv-card .section-title { margin-bottom: 6px; font-size: 13px; }
  .inv-hint { font-size: 10px; color: #8a7e6a; margin-bottom: 8px; }
  .inv-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
  .inv-name { font-size: 11px; color: #e8e0d0; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inv-controls { display: flex; align-items: center; }
  .inv-btn { width: 22px; height: 22px; border: 1px solid #2a2440; background: #252040; color: #C5B69D; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: background 0.1s; }
  .inv-btn:hover { background: #3a3560; }
  .inv-btn:first-child { border-radius: 3px 0 0 3px; }
  .inv-btn:last-child { border-radius: 0 3px 3px 0; }
  .inv-input { width: 36px; height: 22px; text-align: center; border: 1px solid #2a2440; border-left: none; border-right: none; background: #12101c; color: #e8e0d0; font-size: 11px; font-family: inherit; outline: none; }
  .inv-input:focus { border-color: #A57B18; }

  /* Right column: summary */
  .summary-card { background: #1a1528; border: 1px solid #2a2440; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .cost-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .cost-label { font-size: 11px; color: #8a7e6a; }
  .cost-value { font-size: 18px; font-weight: 700; color: #daa520; }
  .cost-value.secondary { font-size: 13px; color: #8a7e6a; }
  .cost-sub { font-size: 10px; color: #8a7e6a; }

  .divider { border: none; border-top: 1px solid #2a2440; margin: 8px 0; }

  /* Crystal needs (compact) */
  .cn-row { display: flex; align-items: center; gap: 4px; padding: 2px 0; font-size: 11px; }
  .cn-name { flex: 1; color: #e8e0d0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cn-need { color: #C5B69D; min-width: 28px; text-align: right; }
  .cn-owned { color: #44aa66; min-width: 28px; text-align: right; }
  .cn-remain { min-width: 28px; text-align: right; font-weight: 600; }
  .cn-remain.zero { color: #44aa66; }
  .cn-remain.need { color: #d94444; }
  .cn-price { color: #daa520; min-width: 60px; text-align: right; }

  .cn-header { display: flex; gap: 4px; padding: 2px 0 4px; font-size: 9px; color: #5a5460; border-bottom: 1px solid #2a2440; margin-bottom: 4px; }
  .cn-header span:first-child { flex: 1; }
</style>
</head>

  { name:'文理強放逐', icon:64640, cat:'攻擊', desc:'範圍無屬性攻擊（威力150），不死系特效。', ingredients:[{name:'祭司的記憶',qty:2},{name:'鬥士的記憶',qty:1}] },
  { name:'文理魔法爆發', icon:64648, cat:'攻擊', desc:'魔法傷害提高100%，MP消耗提高100%。', ingredients:[{name:'術士的記憶',qty:3}] },
  { name:'文理雙刃劍', icon:64649, cat:'攻擊', desc:'物理攻擊力每層提高15%（最大5層），受傷害增加。', ingredients:[{name:'武人的記憶',qty:3},{name:'鬥士的記憶',qty:3}] },
  { name:'文理銳眼追擊', icon:64650, cat:'攻擊', desc:'遠程攻擊（威力80），目標HP越低威力越高。', ingredients:[{name:'斥候的記憶',qty:3},{name:'武人的記憶',qty:3}] },
  { name:'文理探景', icon:64651, cat:'輔助', desc:'顯示陷阱（15碼）／偵測（30碼）。', ingredients:[{name:'盜賊的記憶',qty:3}] },
  { name:'賢者的記憶', icon:64652, cat:'睿識', desc:'魔法攻擊力提高35%，魔法防禦力提高。', ingredients:[{name:'術士的記憶',qty:1},{name:'祭司的記憶',qty:1},{name:'英傑的記憶',qty:1}] },
  { name:'劍豪的記憶', icon:64653, cat:'睿識', desc:'物理攻擊力提高40%，最大HP降低。', ingredients:[{name:'鬥士的記憶',qty:1},{name:'武人的記憶',qty:1},{name:'英傑的記憶',qty:1}] },
  { name:'弓聖的記憶', icon:64654, cat:'睿識', desc:'物理攻擊力提高25%，迴避率提高。', ingredients:[{name:'斥候的記憶',qty:1},{name:'武人的記憶',qty:1},{name:'英傑的記憶',qty:1}] },
  { name:'豪傑的記憶', icon:64655, cat:'睿識', desc:'受到的傷害減少64%，受到的回復減少。', ingredients:[{name:'守護者的記憶',qty:1},{name:'英傑的記憶',qty:2}] },
  { name:'文理獻祭', icon:64656, cat:'回復', desc:'回復目標100%HP（倒下狀態可用），自己HP歸零。', ingredients:[{name:'殺手的記憶',qty:3},{name:'祭司的記憶',qty:3}] },
];

const catColors = { '睿識':'#8b6cc5','精神':'#4a90d9','攻擊':'#d94444','防禦':'#4488aa','回復':'#44aa66','輔助':'#d9a544','移動':'#6aaa6a' };
const unlocked = new Set([0,1,4,5,10,14,18,28,31,35,38,51]);
const inventory = {};
mnemeOrder.forEach(m => inventory[m] = 0);
inventory['術士的記憶'] = 3;
inventory['祭司的記憶'] = 5;

const gridEl = document.getElementById('grid');
const cells = [];

skills.forEach((skill, idx) => {
  const cell = document.createElement('div');
  cell.className = `cell ${unlocked.has(idx) ? 'unlocked' : 'locked'}`;
  const row = Math.floor(idx/10), col = idx%10;
  if (row < 2) cell.classList.add('tip-below');
  if (col < 2) cell.classList.add('tip-left');
  if (col > 7) cell.classList.add('tip-right');
  const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;
  cell.innerHTML = `
    <img class="icon" src="${iconUrl}" alt="${skill.name}" loading="lazy">
    <div class="tooltip">
      <div class="t-header"><img class="t-icon" src="${iconUrl}"><div><div class="t-name">${skill.name}</div><div class="t-cat" style="color:${catColors[skill.cat]}">${skill.cat} #${idx+1}</div></div></div>
      <div class="t-desc">${skill.desc}</div>
    </div>`;
  cell.addEventListener('click', () => toggleSkill(idx));
  gridEl.appendChild(cell);
  cells.push(cell);
});

// Inventory UI
const invGrid = document.getElementById('invGrid');
mnemeOrder.forEach(name => {
  const row = document.createElement('div');
  row.className = 'inv-row';
  row.innerHTML = `
    <div class="inv-name">${name}</div>
    <div class="inv-controls">
      <button class="inv-btn" onclick="changeInv('${name}',-1)">−</button>
      <input class="inv-input" id="inv-${name}" type="number" min="0" value="${inventory[name]}" onchange="setInv('${name}',this.value)" onfocus="this.select()">
      <button class="inv-btn" onclick="changeInv('${name}',1)">+</button>
    </div>`;
  invGrid.appendChild(row);
});

function changeInv(name, d) { inventory[name] = Math.max(0,(inventory[name]||0)+d); document.getElementById(`inv-${name}`).value = inventory[name]; refresh(); }
function setInv(name, v) { inventory[name] = Math.max(0,parseInt(v)||0); document.getElementById(`inv-${name}`).value = inventory[name]; refresh(); }

function toggleSkill(idx) {
  if (unlocked.has(idx)) unlocked.delete(idx); else unlocked.add(idx);
  cells[idx].classList.toggle('unlocked');
  cells[idx].classList.toggle('locked');
  refresh();
}

function refresh() {
  // Progress
  document.getElementById('pFill').style.width = `${(unlocked.size/56)*100}%`;
  document.getElementById('pText').textContent = `${unlocked.size} / 56 已習得`;

  // Calc
  const needTotals = {}; mnemeOrder.forEach(m => needTotals[m] = 0);
  let fullTotal = 0;
  skills.forEach((skill, idx) => {
    const p = skill.ingredients.reduce((s,i) => s+(mnemePrice[i.name]||0)*i.qty, 0);
    fullTotal += p;
    if (!unlocked.has(idx)) skill.ingredients.forEach(i => { needTotals[i.name] += i.qty; });
  });
  let unlearntCost = 0;
  mnemeOrder.forEach(name => { unlearntCost += Math.max(0, needTotals[name]-(inventory[name]||0)) * (mnemePrice[name]||0); });

  document.getElementById('totalCost').textContent = `${unlearntCost.toLocaleString()} Gil`;
  document.getElementById('totalCount').textContent = `${56-unlocked.size} 個技能未習得`;
  document.getElementById('fullCost').textContent = `${fullTotal.toLocaleString()} Gil`;

  // Crystal needs
  const cg = document.getElementById('crystalGrid');
  cg.innerHTML = '';
  mnemeOrder.forEach(name => {
    const need = needTotals[name], owned = inventory[name]||0, rem = Math.max(0,need-owned);
    const cost = rem * (mnemePrice[name]||0);
    const r = document.createElement('div');
    r.className = 'cn-row';
    r.innerHTML = `
      <div class="cn-name">${name}</div>
      <div class="cn-need">×${need}</div>
      <div class="cn-owned">${owned}</div>
      <div class="cn-remain ${rem===0?'zero':'need'}">${rem}</div>
      <div class="cn-price">${cost>0?cost.toLocaleString():'—'}</div>`;
    cg.appendChild(r);
  });

  // Recipe list
  const list = document.getElementById('recipeList');
  list.innerHTML = '';
  skills.forEach((skill, idx) => {
    const isL = unlocked.has(idx);
    const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;
    const matsStr = skill.ingredients.map(i=>`${i.name} ×${i.qty}`).join(' + ');
    const price = skill.ingredients.reduce((s,i)=>s+(mnemePrice[i.name]||0)*i.qty, 0);
    const item = document.createElement('div');
    item.className = `recipe-item ${isL?'learned':''}`;
    item.innerHTML = `
      <img class="r-icon" src="${iconUrl}">
      <div class="r-info"><div class="r-name">${idx+1}. ${skill.name}${isL?' <span style="color:#A57B18;font-size:10px;">✓ 已習得</span>':''}</div><div class="r-mats">${matsStr}</div></div>
      <div class="r-right"><div class="r-price">${price.toLocaleString()} Gil</div><div class="r-toggle" style="color:${isL?'#A57B18':'#8a7e6a'}">${isL?'取消':'標記習得'}</div></div>`;
    item.addEventListener('click', () => toggleSkill(idx));
    list.appendChild(item);
  });
}

refresh();
</script>
</body>
</html>
