<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文理技能圖鑑 Mockup v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12101c;
    color: #e8e0d0;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* === Page container === */
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px;
    position: relative;
  }

  /* === Decorative bg === */
  .page::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(88,56,160,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(40,60,140,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .page > * { position: relative; z-index: 1; }

  /* === Title === */
  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: #C5B69D;
    margin-bottom: 16px;
  }

  /* === Tabs === */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: #1a1528;
    border-radius: 8px;
    padding: 4px;
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    color: #8a7e6a;
    border: none;
    background: none;
    font-family: inherit;
  }
  .tab:hover { color: #e8e0d0; background: rgba(37,32,64,0.5); }
  .tab.active {
    background: #252040;
    color: #C5B69D;
    font-weight: 500;
  }

  /* === Progress === */
  .progress-section {
    margin-bottom: 16px;
  }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar {
    flex: 1;
    background: #252040;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #A57B18, #C5B69D);
    border-radius: 4px;
    transition: width 0.3s;
  }
  .progress-text {
    color: #8a7e6a;
    font-size: 13px;
    white-space: nowrap;
  }

  /* === Grid === */
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    margin-bottom: 24px;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 2px solid #2a2440;
    background: #1a1528;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, opacity 0.2s, transform 0.15s;
    overflow: visible;
  }
  .cell:hover { transform: scale(1.08); z-index: 10; }
  .cell.unlocked { border-color: #A57B18; }
  .cell.unlocked:hover { border-color: #C5B69D; box-shadow: 0 0 12px rgba(197,182,157,0.3); }
  .cell.unlocked .icon { width: 80%; height: 80%; object-fit: contain; border-radius: 3px; }
  .cell.locked { opacity: 0.4; }
  .cell.locked:hover { opacity: 0.7; border-color: #4a4460; }
  .cell.locked .icon { width: 80%; height: 80%; object-fit: contain; border-radius: 3px; filter: brightness(0.25) grayscale(1); }

  /* Checkmark for unlocked */
  .cell.unlocked::after {
    content: '✓';
    position: absolute;
    bottom: 1px;
    right: 2px;
    font-size: 9px;
    color: #A57B18;
    font-weight: bold;
  }

  /* === Tooltip === */
  .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    background: #1a1528;
    border: 1px solid #A57B18;
    border-radius: 8px;
    padding: 12px;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .cell:hover .tooltip { display: block; }
  .cell.tip-below .tooltip { bottom: auto; top: calc(100% + 8px); }
  .cell.tip-left .tooltip { left: 0; transform: translateX(0); }
  .cell.tip-right .tooltip { left: auto; right: 0; transform: translateX(0); }
  .tooltip .t-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .tooltip .t-icon { width: 36px; height: 36px; border-radius: 4px; }
  .tooltip .t-name { font-size: 14px; font-weight: bold; color: #C5B69D; }
  .tooltip .t-cat { font-size: 11px; }
  .tooltip .t-desc { font-size: 12px; color: #e8e0d0; line-height: 1.5; border-top: 1px solid #2a2440; padding-top: 8px; }

  /* === Collapsible recipe section === */
  .recipe-toggle {
    width: 100%;
    background: #1a1528;
    border: 1px solid #2a2440;
    border-radius: 8px;
    padding: 14px 16px;
    color: #C5B69D;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: inherit;
    transition: background 0.2s;
  }
  .recipe-toggle:hover { background: #252040; }
  .recipe-toggle .arrow {
    transition: transform 0.3s;
    font-size: 12px;
    color: #8a7e6a;
  }
  .recipe-toggle.open .arrow { transform: rotate(180deg); }

  .recipe-panel {
    display: none;
    background: #1a1528;
    border: 1px solid #2a2440;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 16px;
    margin-top: -8px;
  }
  .recipe-panel.open { display: block; }

  /* Summary bar */
  .recipe-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: #252040;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .recipe-summary .label { font-size: 12px; color: #8a7e6a; }
  .recipe-summary .value { font-size: 18px; font-weight: 700; color: #daa520; }
  .recipe-summary .sub { font-size: 11px; color: #8a7e6a; margin-top: 2px; }

  /* Recipe list */
  .recipe-list { display: flex; flex-direction: column; gap: 8px; }
  .recipe-item {
    background: #12101c;
    border: 1px solid #2a2440;
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .recipe-item .r-icon { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; }
  .recipe-item .r-name { font-size: 13px; color: #e8e0d0; flex: 1; }
  .recipe-item .r-mats { font-size: 11px; color: #8a7e6a; }
  .recipe-item .r-price { font-size: 13px; color: #daa520; font-weight: 500; white-space: nowrap; }
  .recipe-item.learned { opacity: 0.4; }
  .recipe-item.learned .r-price { text-decoration: line-through; color: #8a7e6a; }
  .recipe-item.learned .r-name::after { content: ' ✓ 已習得'; font-size: 11px; color: #A57B18; }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    font-size: 11px;
    color: #8a7e6a;
    margin-bottom: 20px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 1.5px solid; }
  .legend-dot.u { background: #A57B18; border-color: #A57B18; }
  .legend-dot.l { background: #1a1528; border-color: #2a2440; opacity: 0.5; }
</style>

  { id:'wisdom-fiendhunter', name:'弓聖的記憶', icon:64654, cat:'睿識', desc:'物理攻擊力提高25%，迴避率提高。', mats:'斥候的記憶 ×1 + 武人的記憶 ×1 + 英傑的記憶 ×1', price:62200 },
  { id:'wisdom-indomitable', name:'豪傑的記憶', icon:64655, cat:'睿識', desc:'受到的傷害減少64%，受到的回復減少。', mats:'守護者的記憶 ×1 + 英傑的記憶 ×2', price:112400 },
  { id:'sacrifice-l', name:'文理獻祭', icon:64656, cat:'回復', desc:'回復目標100%HP（倒下狀態可用），自己HP歸零。', mats:'殺手的記憶 ×3 + 祭司的記憶 ×3', price:112500 },
];

const catColors = {
  '睿識': '#8b6cc5', '精神': '#4a90d9', '攻擊': '#d94444',
  '防禦': '#4488aa', '回復': '#44aa66', '輔助': '#d9a544', '移動': '#6aaa6a',
};

// Demo unlocked
const unlocked = new Set([0,1,4,5,10,14,18,28,31,35,38,51].map(i => skills[i].id));

const grid = document.getElementById('grid');

skills.forEach((skill, idx) => {
  const isUnlocked = unlocked.has(skill.id);
  const cell = document.createElement('div');
  cell.className = `cell ${isUnlocked ? 'unlocked' : 'locked'}`;
  cell.dataset.idx = idx;

  const row = Math.floor(idx / 10);
  const col = idx % 10;
  if (row < 2) cell.classList.add('tip-below');
  if (col < 2) cell.classList.add('tip-left');
  if (col > 7) cell.classList.add('tip-right');

  const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;
  cell.innerHTML = `
    <img class="icon" src="${iconUrl}" alt="${skill.name}" loading="lazy">
    <div class="tooltip">
      <div class="t-header">
        <img class="t-icon" src="${iconUrl}" alt="">
        <div>
          <div class="t-name">${skill.name}</div>
          <div class="t-cat" style="color:${catColors[skill.cat]}">${skill.cat} #${idx+1}</div>
        </div>
      </div>
      <div class="t-desc">${skill.desc}</div>
    </div>
  `;

  cell.addEventListener('click', () => {
    const id = skills[idx].id;
    if (unlocked.has(id)) unlocked.delete(id); else unlocked.add(id);
    cell.classList.toggle('unlocked');
    cell.classList.toggle('locked');
    updateProgress();
    renderRecipes();
  });

  grid.appendChild(cell);
});

function updateProgress() {
  const count = unlocked.size;
  document.getElementById('pFill').style.width = `${(count/56)*100}%`;
  document.getElementById('pText').textContent = `${count} / 56 已習得`;
}

function toggleRecipes() {
  const btn = document.getElementById('recipeToggle');
  const panel = document.getElementById('recipePanel');
  btn.classList.toggle('open');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderRecipes();
}

function renderRecipes() {
  const list = document.getElementById('recipeList');
  list.innerHTML = '';
  let unlearntTotal = 0;
  let fullTotal = 0;

  skills.forEach((skill, idx) => {
    const isLearned = unlocked.has(skill.id);
    const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;
    fullTotal += skill.price;
    if (!isLearned) unlearntTotal += skill.price;

    const item = document.createElement('div');
    item.className = `recipe-item ${isLearned ? 'learned' : ''}`;
    item.innerHTML = `
      <img class="r-icon" src="${iconUrl}" alt="">
      <div style="flex:1;min-width:0;">
        <div class="r-name">${idx+1}. ${skill.name}</div>
        <div class="r-mats">${skill.mats}</div>
      </div>
      <div class="r-price">${skill.price.toLocaleString()} Gil</div>
    `;
    list.appendChild(item);
  });

  document.getElementById('totalCost').textContent = `${unlearntTotal.toLocaleString()} Gil`;
  document.getElementById('totalCount').textContent = `${56 - unlocked.size} 個技能未習得`;
  document.getElementById('fullCost').textContent = `${fullTotal.toLocaleString()} Gil`;
}

updateProgress();
</script>
</body>
</html>
