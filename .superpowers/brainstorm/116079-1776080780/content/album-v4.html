<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文理技能圖鑑 Mockup v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12101c;
    color: #e8e0d0;
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px;
    position: relative;
  }
  .page::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(88,56,160,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(40,60,140,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .page > * { position: relative; z-index: 1; }

  .page-title { font-size: 22px; font-weight: 700; color: #C5B69D; margin-bottom: 16px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #1a1528; border-radius: 8px; padding: 4px; }
  .tab {
    padding: 8px 16px; font-size: 13px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s; color: #8a7e6a; border: none; background: none; font-family: inherit;
  }
  .tab:hover { color: #e8e0d0; background: rgba(37,32,64,0.5); }
  .tab.active { background: #252040; color: #C5B69D; font-weight: 500; }

  /* Progress */
  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .progress-bar { flex: 1; background: #252040; border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #A57B18, #C5B69D); border-radius: 4px; transition: width 0.3s; }
  .progress-text { color: #8a7e6a; font-size: 13px; white-space: nowrap; }

  /* Legend */
  .legend { display: flex; gap: 16px; justify-content: center; font-size: 11px; color: #8a7e6a; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; border: 1.5px solid; }
  .legend-dot.u { background: #A57B18; border-color: #A57B18; }
  .legend-dot.l { background: #1a1528; border-color: #2a2440; opacity: 0.5; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 24px; }
  .cell {
    aspect-ratio: 1; border-radius: 6px; border: 2px solid #2a2440; background: #1a1528;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    position: relative; transition: border-color 0.2s, opacity 0.2s, transform 0.15s; overflow: visible;
  }
  .cell:hover { transform: scale(1.08); z-index: 10; }
  .cell.unlocked { border-color: #A57B18; }
  .cell.unlocked:hover { border-color: #C5B69D; box-shadow: 0 0 12px rgba(197,182,157,0.3); }
  .cell .icon { width: 80%; height: 80%; object-fit: contain; border-radius: 3px; }
  .cell.locked { opacity: 0.4; }
  .cell.locked:hover { opacity: 0.7; border-color: #4a4460; }
  .cell.locked .icon { filter: brightness(0.25) grayscale(1); }
  .cell.unlocked::after {
    content: '✓'; position: absolute; bottom: 1px; right: 2px;
    font-size: 9px; color: #A57B18; font-weight: bold;
  }

  /* Tooltip */
  .tooltip {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%); width: 280px; background: #1a1528;
    border: 1px solid #A57B18; border-radius: 8px; padding: 12px;
    z-index: 100; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .cell:hover .tooltip { display: block; }
  .cell.tip-below .tooltip { bottom: auto; top: calc(100% + 8px); }
  .cell.tip-left .tooltip { left: 0; transform: translateX(0); }
  .cell.tip-right .tooltip { left: auto; right: 0; transform: translateX(0); }
  .tooltip .t-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .tooltip .t-icon { width: 36px; height: 36px; border-radius: 4px; }
  .tooltip .t-name { font-size: 14px; font-weight: bold; color: #C5B69D; }
  .tooltip .t-cat { font-size: 11px; }
  .tooltip .t-desc { font-size: 12px; color: #e8e0d0; line-height: 1.5; border-top: 1px solid #2a2440; padding-top: 8px; }

  /* Collapsible */
  .recipe-toggle {
    width: 100%; background: #1a1528; border: 1px solid #2a2440; border-radius: 8px;
    padding: 14px 16px; color: #C5B69D; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    font-family: inherit; transition: background 0.2s;
  }
  .recipe-toggle:hover { background: #252040; }
  .recipe-toggle .arrow { transition: transform 0.3s; font-size: 12px; color: #8a7e6a; }
  .recipe-toggle.open .arrow { transform: rotate(180deg); }
  .recipe-toggle.open { border-radius: 8px 8px 0 0; }

  .recipe-panel {
    display: none; background: #1a1528; border: 1px solid #2a2440; border-top: none;
    border-radius: 0 0 8px 8px; padding: 16px;
  }
  .recipe-panel.open { display: block; }

  /* Summary */
  .recipe-summary {
    display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .summary-card {
    flex: 1; min-width: 200px; padding: 14px 16px; background: #252040; border-radius: 8px;
  }
  .summary-card .label { font-size: 12px; color: #8a7e6a; margin-bottom: 4px; }
  .summary-card .value { font-size: 20px; font-weight: 700; color: #daa520; }
  .summary-card .sub { font-size: 11px; color: #8a7e6a; margin-top: 2px; }
  .summary-card.secondary .value { font-size: 16px; color: #8a7e6a; }

  /* Crystal summary */
  .crystal-section { margin-bottom: 16px; }
  .crystal-title {
    font-size: 13px; font-weight: 500; color: #C5B69D; margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid #2a2440;
  }
  .crystal-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px;
  }
  .crystal-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: #12101c; border: 1px solid #2a2440; border-radius: 6px;
  }
  .crystal-item .c-name { font-size: 12px; color: #e8e0d0; flex: 1; }
  .crystal-item .c-qty { font-size: 13px; font-weight: 600; color: #C5B69D; }
  .crystal-item .c-price { font-size: 11px; color: #daa520; }

  /* Divider */
  .section-divider {
    border: none; border-top: 1px solid #2a2440; margin: 16px 0;
  }

  /* Recipe list */
  .recipe-list-title {
    font-size: 13px; font-weight: 500; color: #C5B69D; margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid #2a2440;
  }
  .recipe-list { display: flex; flex-direction: column; gap: 6px; }
  .recipe-item {
    background: #12101c; border: 1px solid #2a2440; border-radius: 6px;
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  .recipe-item:hover { border-color: #4a4460; background: #1a1528; }
  .recipe-item .r-icon { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; }
  .recipe-item .r-info { flex: 1; min-width: 0; }
  .recipe-item .r-name { font-size: 13px; color: #e8e0d0; }
  .recipe-item .r-mats { font-size: 11px; color: #8a7e6a; margin-top: 2px; }
  .recipe-item .r-right { text-align: right; flex-shrink: 0; }
  .recipe-item .r-price { font-size: 13px; color: #daa520; font-weight: 500; }
  .recipe-item .r-toggle { font-size: 10px; color: #8a7e6a; margin-top: 2px; }
  .recipe-item.learned { opacity: 0.45; }
  .recipe-item.learned .r-price { text-decoration: line-through; color: #8a7e6a; }
  .recipe-item.learned .r-name { color: #8a7e6a; }
  .recipe-item.learned .r-toggle { color: #A57B18; }
</style>

  { name:'文理銳眼追擊', icon:64650, cat:'攻擊', desc:'遠程攻擊（威力80），目標HP越低威力越高。', ingredients:[{name:'斥候的記憶',qty:3},{name:'武人的記憶',qty:3}] },
  { name:'文理探景', icon:64651, cat:'輔助', desc:'顯示陷阱（15碼）／偵測（30碼）。', ingredients:[{name:'盜賊的記憶',qty:3}] },
  { name:'賢者的記憶', icon:64652, cat:'睿識', desc:'魔法攻擊力提高35%，魔法防禦力提高。', ingredients:[{name:'術士的記憶',qty:1},{name:'祭司的記憶',qty:1},{name:'英傑的記憶',qty:1}] },
  { name:'劍豪的記憶', icon:64653, cat:'睿識', desc:'物理攻擊力提高40%，最大HP降低。', ingredients:[{name:'鬥士的記憶',qty:1},{name:'武人的記憶',qty:1},{name:'英傑的記憶',qty:1}] },
  { name:'弓聖的記憶', icon:64654, cat:'睿識', desc:'物理攻擊力提高25%，迴避率提高。', ingredients:[{name:'斥候的記憶',qty:1},{name:'武人的記憶',qty:1},{name:'英傑的記憶',qty:1}] },
  { name:'豪傑的記憶', icon:64655, cat:'睿識', desc:'受到的傷害減少64%，受到的回復減少。', ingredients:[{name:'守護者的記憶',qty:1},{name:'英傑的記憶',qty:2}] },
  { name:'文理獻祭', icon:64656, cat:'回復', desc:'回復目標100%HP（倒下狀態可用），自己HP歸零。', ingredients:[{name:'殺手的記憶',qty:3},{name:'祭司的記憶',qty:3}] },
];

const catColors = {
  '睿識':'#8b6cc5','精神':'#4a90d9','攻擊':'#d94444',
  '防禦':'#4488aa','回復':'#44aa66','輔助':'#d9a544','移動':'#6aaa6a',
};

const unlocked = new Set([0,1,4,5,10,14,18,28,31,35,38,51]);
const grid = document.getElementById('grid');
const cells = [];

skills.forEach((skill, idx) => {
  const cell = document.createElement('div');
  cell.className = `cell ${unlocked.has(idx) ? 'unlocked' : 'locked'}`;
  cell.dataset.idx = idx;
  const row = Math.floor(idx/10), col = idx%10;
  if (row < 2) cell.classList.add('tip-below');
  if (col < 2) cell.classList.add('tip-left');
  if (col > 7) cell.classList.add('tip-right');

  const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;
  cell.innerHTML = `
    <img class="icon" src="${iconUrl}" alt="${skill.name}" loading="lazy">
    <div class="tooltip">
      <div class="t-header">
        <img class="t-icon" src="${iconUrl}" alt="">
        <div>
          <div class="t-name">${skill.name}</div>
          <div class="t-cat" style="color:${catColors[skill.cat]}">${skill.cat} #${idx+1}</div>
        </div>
      </div>
      <div class="t-desc">${skill.desc}</div>
    </div>`;

  cell.addEventListener('click', () => toggleSkill(idx));
  grid.appendChild(cell);
  cells.push(cell);
});

function toggleSkill(idx) {
  if (unlocked.has(idx)) unlocked.delete(idx); else unlocked.add(idx);
  cells[idx].classList.toggle('unlocked');
  cells[idx].classList.toggle('locked');
  updateProgress();
  if (document.getElementById('recipePanel').classList.contains('open')) renderRecipes();
}

function updateProgress() {
  const count = unlocked.size;
  document.getElementById('pFill').style.width = `${(count/56)*100}%`;
  document.getElementById('pText').textContent = `${count} / 56 已習得`;
}

function toggleRecipes() {
  document.getElementById('recipeToggle').classList.toggle('open');
  document.getElementById('recipePanel').classList.toggle('open');
  if (document.getElementById('recipePanel').classList.contains('open')) renderRecipes();
}

function calcPrice(ingredients) {
  return ingredients.reduce((sum, ing) => sum + (mnemes[ing.name]?.unitPrice || 0) * ing.qty, 0);
}

function renderRecipes() {
  const list = document.getElementById('recipeList');
  list.innerHTML = '';
  let unlearntTotal = 0, fullTotal = 0;
  const crystalTotals = {};

  skills.forEach((skill, idx) => {
    const isLearned = unlocked.has(idx);
    const price = calcPrice(skill.ingredients);
    fullTotal += price;
    if (!isLearned) {
      unlearntTotal += price;
      skill.ingredients.forEach(ing => {
        crystalTotals[ing.name] = (crystalTotals[ing.name] || 0) + ing.qty;
      });
    }

    const iconUrl = `https://xivapi.com/i/064000/0${skill.icon}.png`;
    const matsStr = skill.ingredients.map(i => `${i.name} ×${i.qty}`).join(' + ');
    const item = document.createElement('div');
    item.className = `recipe-item ${isLearned ? 'learned' : ''}`;
    item.innerHTML = `
      <img class="r-icon" src="${iconUrl}" alt="">
      <div class="r-info">
        <div class="r-name">${idx+1}. ${skill.name}${isLearned ? ' <span style="color:#A57B18;font-size:11px;">✓ 已習得</span>' : ''}</div>
        <div class="r-mats">${matsStr}</div>
      </div>
      <div class="r-right">
        <div class="r-price">${price.toLocaleString()} Gil</div>
        <div class="r-toggle">${isLearned ? '點擊取消' : '點擊標記習得'}</div>
      </div>`;
    item.addEventListener('click', () => toggleSkill(idx));
    list.appendChild(item);
  });

  document.getElementById('totalCost').textContent = `${unlearntTotal.toLocaleString()} Gil`;
  document.getElementById('totalCount').textContent = `${56 - unlocked.size} 個技能未習得`;
  document.getElementById('fullCost').textContent = `${fullTotal.toLocaleString()} Gil`;

  // Crystal summary
  const crystalGrid = document.getElementById('crystalGrid');
  crystalGrid.innerHTML = '';
  const sortedCrystals = Object.entries(crystalTotals).sort((a,b) => b[1] - a[1]);
  sortedCrystals.forEach(([name, qty]) => {
    const unitPrice = mnemes[name]?.unitPrice || 0;
    const subtotal = unitPrice * qty;
    const item = document.createElement('div');
    item.className = 'crystal-item';
    item.innerHTML = `
      <div class="c-name">${name}</div>
      <div class="c-qty">×${qty}</div>
      <div class="c-price">${subtotal.toLocaleString()} Gil</div>`;
    crystalGrid.appendChild(item);
  });
}

updateProgress();
</script>
</body>
</html>
