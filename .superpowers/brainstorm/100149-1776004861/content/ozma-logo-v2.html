<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozma Logo - SVG Version</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #12101c; color: #e8e0d0; font-family: 'Noto Sans TC', sans-serif; padding: 24px; }
  h1 { text-align: center; font-size: 1.3rem; color: #C5B69D; font-family: 'LXGW WenKai', serif; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #6a5e4a; font-size: 0.8rem; margin-bottom: 32px; }
  .section-label { font-size: 0.75rem; color: #8a7e6a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }

  .showcase { display: flex; flex-direction: column; align-items: center; gap: 32px; max-width: 800px; margin: 0 auto; }

  /* Forms row */
  .forms-row { display: flex; gap: 40px; justify-content: center; align-items: center; }
  .form-item { text-align: center; }
  .form-item .label { font-size: 0.7rem; color: #6a5e4a; margin-top: 8px; }

  /* Ozma SVG container */
  .ozma-wrap { position: relative; display: inline-block; }
  .ozma-svg { overflow: visible; }

  /* Animated container */
  .anim-box { padding: 32px; background: #1a1528; border-radius: 12px; border: 1px solid #2a2440; width: 100%; text-align: center; }

  /* NavBar */
  .navbar-demo { width: 100%; background: linear-gradient(180deg, #1a1528, #161220); border: 1px solid #2a2440; border-radius: 10px; padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden; }
  .navbar-demo::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, #C5B69D40 50%, transparent 100%); }
  .nav-logo-text { font-family: 'LXGW WenKai', serif; font-size: 1rem; font-weight: 700; color: #C5B69D; }
  .nav-link { padding: 6px 14px; font-size: 0.82rem; color: #8a7e6a; border-radius: 6px; margin-left: 8px; }
  .nav-link.active { color: #C5B69D; background: #252040; }

  /* Hero */
  .hero-demo { text-align: center; padding: 40px 20px; background: #12101c; border: 1px solid #2a2440; border-radius: 10px; width: 100%; }
  .hero-title { font-family: 'LXGW WenKai', serif; font-size: 1.6rem; color: #C5B69D; margin-top: 16px; }
  .hero-sub { font-size: 0.85rem; color: #8a7e6a; margin-top: 4px; }

  .note { font-size: 0.72rem; color: #6a5e4a; line-height: 1.6; padding: 12px; background: #1a1528; border-radius: 6px; border-left: 3px solid #C5B69D; width: 100%; max-width: 600px; }

  /* Morph animation keyframes */
  @keyframes halo-rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(120,140,255,0.3)); }
    50% { filter: drop-shadow(0 0 14px rgba(120,140,255,0.5)); }
  }

  .float-anim { animation: float 3s ease-in-out infinite; }
  .glow-anim { animation: glow-pulse 2s ease-in-out infinite; }
</style>
</head>
<body>

<script>
// Shape definitions as polygon points
// Cube (tilted isometric)
const CUBE = {
  face1: '50,18 82,36 50,54 18,36',   // top
  face2: '18,36 50,54 50,82 18,64',     // left
  face3: '82,36 50,54 50,82 82,64',     // right
};

// Inverted pyramid
const PYRAMID = {
  face1: '18,25 82,25 50,40',           // top
  face2: '18,25 50,40 50,85',           // left
  face3: '82,25 50,40 50,85',           // right
};

// Sphere (approximated with polygon vertices)
// We'll use many-point polygons to approximate curves
function circlePoints(cx, cy, r, startAngle, endAngle, n) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const a = startAngle + (endAngle - startAngle) * (i / n);
    pts.push(`${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`);
  }
  return pts;
}

const SPHERE = (() => {
  const cx = 50, cy = 50, r = 30;
  // Top hemisphere as face1
  const topArc = circlePoints(cx, cy, r, Math.PI, 0, 16);
  const face1 = topArc.join(' ');
  // Bottom-left quarter
  const blArc = circlePoints(cx, cy, r, 0, Math.PI/2, 8);
  blArc.push(`${cx},${cy}`);
  const face2 = blArc.join(' ');
  // Bottom-right quarter
  const brArc = circlePoints(cx, cy, r, Math.PI/2, Math.PI, 8);
  brArc.push(`${cx},${cy}`);
  const face3 = brArc.join(' ');
  return { face1, face2, face3 };
})();

const shapes = [CUBE, PYRAMID, SPHERE];
const labels = ['立方體', '倒金字塔', '球體'];

// Interpolate polygon points
function parsePoints(str) {
  return str.split(/\s+/).map(p => {
    const [x, y] = p.split(',').map(Number);
    return { x, y };
  });
}

function interpolatePolygons(from, to, t) {
  const fromPts = parsePoints(from);
  const toPts = parsePoints(to);

  // Resample to same number of points
  const maxLen = Math.max(fromPts.length, toPts.length);
  const resampleFrom = resample(fromPts, maxLen);
  const resampleTo = resample(toPts, maxLen);

  return resampleFrom.map((fp, i) => {
    const tp = resampleTo[i];
    const x = fp.x + (tp.x - fp.x) * t;
    const y = fp.y + (tp.y - fp.y) * t;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
}

function resample(pts, n) {
  if (pts.length === n) return pts;
  const result = [];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1) * (pts.length - 1);
    const idx = Math.floor(t);
    const frac = t - idx;
    if (idx >= pts.length - 1) {
      result.push(pts[pts.length - 1]);
    } else {
      result.push({
        x: pts[idx].x + (pts[idx + 1].x - pts[idx].x) * frac,
        y: pts[idx].y + (pts[idx + 1].y - pts[idx].y) * frac,
      });
    }
  }
  return result;
}

// Easing function
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Animation state
let currentShape = 0;
let startTime = performance.now();
const HOLD_MS = 2500;
const MORPH_MS = 800;
const CYCLE_MS = HOLD_MS + MORPH_MS;

function updateShapes(time) {
  const elapsed = (time - startTime) % (CYCLE_MS * 3);
  const cycleIndex = Math.floor(elapsed / CYCLE_MS);
  const posInCycle = elapsed - cycleIndex * CYCLE_MS;

  const fromIdx = cycleIndex % 3;
  const toIdx = (cycleIndex + 1) % 3;
  const from = shapes[fromIdx];
  const to = shapes[toIdx];

  let face1Pts, face2Pts, face3Pts;
  let labelText;

  if (posInCycle < HOLD_MS) {
    // Hold
    face1Pts = from.face1;
    face2Pts = from.face2;
    face3Pts = from.face3;
    labelText = labels[fromIdx];
  } else {
    // Morph
    const rawT = (posInCycle - HOLD_MS) / MORPH_MS;
    const t = easeInOutCubic(rawT);
    face1Pts = interpolatePolygons(from.face1, to.face1, t);
    face2Pts = interpolatePolygons(from.face2, to.face2, t);
    face3Pts = interpolatePolygons(from.face3, to.face3, t);
    labelText = rawT > 0.5 ? labels[toIdx] : labels[fromIdx];
  }

  // Update all SVG instances
  ['', 'nav-', 'hero-'].forEach(prefix => {
    const f1 = document.getElementById(`${prefix}face1`);
    const f2 = document.getElementById(`${prefix}face2`);
    const f3 = document.getElementById(`${prefix}face3`);
    if (f1) f1.setAttribute('points', face1Pts);
    if (f2) f2.setAttribute('points', face2Pts);
    if (f3) f3.setAttribute('points', face3Pts);
  });

  document.getElementById('anim-label').textContent = labelText;

  // Highlight for sphere form
  const hl = document.getElementById('highlight');
  if (hl) {
    if (posInCycle >= HOLD_MS && fromIdx === 1) {
      const t = easeInOutCubic((posInCycle - HOLD_MS) / MORPH_MS);
      hl.setAttribute('r', (8 * t).toFixed(1));
      hl.setAttribute('opacity', (0.25 * t).toFixed(2));
    } else if (fromIdx === 2 && posInCycle < HOLD_MS) {
      hl.setAttribute('r', '8');
      hl.setAttribute('opacity', '0.25');
    } else if (fromIdx === 2 && posInCycle >= HOLD_MS) {
      const t = 1 - easeInOutCubic((posInCycle - HOLD_MS) / MORPH_MS);
      hl.setAttribute('r', (8 * t).toFixed(1));
      hl.setAttribute('opacity', (0.25 * t).toFixed(2));
    } else {
      hl.setAttribute('r', '0');
      hl.setAttribute('opacity', '0');
    }
  }

  requestAnimationFrame(updateShapes);
}

// Initialize
['', 'nav-', 'hero-'].forEach(prefix => {
  const f1 = document.getElementById(`${prefix}face1`);
  const f2 = document.getElementById(`${prefix}face2`);
  const f3 = document.getElementById(`${prefix}face3`);
  if (f1) f1.setAttribute('points', CUBE.face1);
  if (f2) f2.setAttribute('points', CUBE.face2);
  if (f3) f3.setAttribute('points', CUBE.face3);
});

requestAnimationFrame(updateShapes);
</script>
