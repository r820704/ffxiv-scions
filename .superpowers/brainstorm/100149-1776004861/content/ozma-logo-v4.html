<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozma Logo v4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #12101c; color: #e8e0d0; font-family: 'Noto Sans TC', sans-serif; padding: 24px; }
  h1 { text-align: center; font-size: 1.3rem; color: #C5B69D; font-family: 'LXGW WenKai', serif; margin-bottom: 4px; }
  .page-sub { text-align: center; color: #6a5e4a; font-size: 0.8rem; margin-bottom: 32px; }
  .section-label { font-size: 0.75rem; color: #8a7e6a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }
  .showcase { display: flex; flex-direction: column; align-items: center; gap: 32px; max-width: 800px; margin: 0 auto; }
  .ozma-container { position: relative; display: inline-block; }
  .float { animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .anim-box { padding: 40px; background: #1a1528; border-radius: 12px; border: 1px solid #2a2440; width: 100%; text-align: center; }
  .navbar-demo { width:100%; background:linear-gradient(180deg,#1a1528,#161220); border:1px solid #2a2440; border-radius:10px; padding:0 20px; height:52px; display:flex; align-items:center; gap:10px; position:relative; overflow:hidden; }
  .navbar-demo::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,#C5B69D40,transparent); }
  .nav-logo-text { font-family:'LXGW WenKai',serif; font-size:1rem; font-weight:700; color:#C5B69D; }
  .nav-link { padding:6px 14px; font-size:0.82rem; color:#8a7e6a; border-radius:6px; margin-left:8px; }
  .nav-link.active { color:#C5B69D; background:#252040; }
  .hero-demo { text-align:center; padding:40px 20px; background:#12101c; border:1px solid #2a2440; border-radius:10px; width:100%; }
  .hero-title { font-family:'LXGW WenKai',serif; font-size:1.6rem; color:#C5B69D; margin-top:16px; }
  .hero-sub { font-size:0.85rem; color:#8a7e6a; margin-top:4px; }
  .note { font-size:0.72rem; color:#6a5e4a; line-height:1.6; padding:12px; background:#1a1528; border-radius:6px; border-left:3px solid #C5B69D; width:100%; max-width:600px; }
  #form-label { font-size:0.8rem; color:#8a7e6a; margin-top:12px; transition: opacity 0.3s; }
</style>
</head>
<body>
<h1>奧茲瑪 Logo — v4</h1>
<p class="page-sub">崩壞星芒 → 收斂重組的變形過渡</p>
<div class="showcase">
  <div class="anim-box">
    <div class="section-label">動畫效果</div>
    <div class="float">
      <div class="ozma-container"><canvas id="main-canvas" width="320" height="320" style="width:160px;height:160px;"></canvas></div>
    </div>
    <div id="form-label">立方體</div>
  </div>
  <div style="width:100%;">
    <div class="section-label">NavBar</div>
    <div class="navbar-demo">
      <div class="float">
        <div class="ozma-container"><canvas id="nav-canvas" width="64" height="64" style="width:32px;height:32px;"></canvas></div>
      </div>
      <span class="nav-logo-text">FFXIV 工具箱</span>
      <span class="nav-link active">天氣查詢</span>
      <span class="nav-link">文理技能</span>
    </div>
  </div>
  <div style="width:100%;">
    <div class="section-label">首頁 Hero</div>
    <div class="hero-demo">
      <div class="float">
        <div class="ozma-container"><canvas id="hero-canvas" width="240" height="240" style="width:120px;height:120px;"></canvas></div>
      </div>
      <div class="hero-title">FFXIV 工具箱</div>
      <div class="hero-sub">Final Fantasy XIV 繁中伺服器玩家工具</div>
    </div>
  </div>
  <div class="note">
    <strong style="color:#C5B69D;">v4 改進：</strong><br>
    • 正方體比例修正，更高更立體<br>
    • 變形過渡：形態 → 星芒爆裂崩壞 → 收斂重組成新形態<br>
    • 崩壞階段頂點隨機外射，形成不規則尖刺<br>
    • 粒子特效大幅增量，爆裂瞬間噴射更多光點<br>
    • 收斂階段粒子被吸回中心
  </div>
</div>
<script>
const TAU = Math.PI * 2;

// ===== Shape Definitions (normalized to [-1,1]) =====

// Cube - taller, proper isometric
function getCubeVerts() {
  const s = 0.48;
  const h = s * 0.7; // height ratio for isometric
  return [
    // top face (4 points)
    { x: 0,  y: -s - h * 0.3 },
    { x: s,  y: -h * 0.8 },
    { x: 0,  y: -h * 0.3 },
    { x: -s, y: -h * 0.8 },
    // bottom face (4 points, same order)
    { x: 0,  y: h * 0.3 },
    { x: s,  y: h * 0.8 - 0.05 },
    { x: 0,  y: s + h * 0.3 },
    { x: -s, y: h * 0.8 - 0.05 },
  ];
}

// Inverted pyramid
function getPyramidVerts() {
  const w = 0.55, h = 0.35;
  return [
    // top edge (4 points along top)
    { x: -w,      y: -h },
    { x:  w,      y: -h },
    { x:  w * 0.3, y: -h + 0.05 },
    { x: -w * 0.3, y: -h + 0.05 },
    // bottom convergence
    { x: -0.05, y: h * 1.5 },
    { x:  0.05, y: h * 1.5 },
    { x:  0,    y: h * 1.6 },
    { x:  0,    y: h * 1.4 },
  ];
}

// Sphere (8 representative points around circle)
function getSphereVerts() {
  const r = 0.48;
  const pts = [];
  for (let i = 0; i < 8; i++) {
    const a = TAU * i / 8 - Math.PI / 2;
    pts.push({ x: r * Math.cos(a), y: r * Math.sin(a) });
  }
  return pts;
}

// Starburst intermediate (spiky irregular)
function getStarburstVerts(seed) {
  const pts = [];
  const rng = mulberry32(seed);
  for (let i = 0; i < 8; i++) {
    const a = TAU * i / 8 + (rng() - 0.5) * 0.5;
    const r = 0.5 + rng() * 0.35;
    pts.push({ x: r * Math.cos(a), y: r * Math.sin(a) });
  }
  return pts;
}

// Simple seeded RNG
function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

const shapeVerts = [getCubeVerts(), getPyramidVerts(), getSphereVerts()];
const shapeNames = ['立方體', '倒金字塔', '球體'];

// ===== Interpolation =====
function lerpPt(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }
function lerpVerts(a, b, t) { return a.map((p, i) => lerpPt(p, b[i], t)); }

function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10*t); }
function easeInExpo(t) { return t === 0 ? 0 : Math.pow(2, 10*t-10); }

// ===== Particles =====
let particles = [];
function spawnBurst(count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU;
    const speed = 0.004 + Math.random() * 0.012;
    particles.push({
      x: (Math.random() - 0.5) * 0.15,
      y: (Math.random() - 0.5) * 0.15,
      vx: Math.cos(a) * speed,
      vy: Math.sin(a) * speed,
      life: 1,
      decay: 0.008 + Math.random() * 0.012,
      size: 0.015 + Math.random() * 0.035,
      bright: Math.random() > 0.5,
    });
  }
}
function spawnConverge(count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU;
    const dist = 0.5 + Math.random() * 0.3;
    particles.push({
      x: Math.cos(a) * dist,
      y: Math.sin(a) * dist,
      vx: -Math.cos(a) * 0.008,
      vy: -Math.sin(a) * 0.008,
      life: 1,
      decay: 0.012 + Math.random() * 0.008,
      size: 0.01 + Math.random() * 0.025,
      bright: Math.random() > 0.3,
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= p.decay; });
}

// ===== Drawing =====
function drawShape(ctx, w, h, verts, time, morphPhase) {
  const cx = w / 2, cy = h / 2, scale = w * 0.75;

  ctx.clearRect(0, 0, w, h);

  // Background glow
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.45);
  bgGrad.addColorStop(0, 'rgba(60,70,140,0.15)');
  bgGrad.addColorStop(1, 'rgba(18,16,28,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // Halo
  const pulse = 0.5 + 0.4 * Math.sin(time * 1.5);
  const haloRx = w * 0.42, haloRy = w * 0.1;
  // During morph, halo flares
  const haloFlare = morphPhase > 0 ? 1 + morphPhase * 0.5 : 1;

  ctx.save();
  // Outer glow
  ctx.globalAlpha = pulse * 0.5 * haloFlare;
  ctx.strokeStyle = 'rgba(130,140,255,0.4)';
  ctx.lineWidth = Math.max(1, w * 0.015);
  ctx.beginPath(); ctx.ellipse(cx, cy, haloRx * 1.06, haloRy * 1.06, 0, 0, TAU); ctx.stroke();
  // Main ring
  ctx.globalAlpha = pulse * 0.8 * haloFlare;
  ctx.strokeStyle = 'rgba(170,180,255,0.7)';
  ctx.lineWidth = Math.max(1, w * 0.008);
  ctx.beginPath(); ctx.ellipse(cx, cy, haloRx, haloRy, 0, 0, TAU); ctx.stroke();
  // Rotating spots
  const sa1 = time * 0.9, sa2 = sa1 + Math.PI;
  for (const a of [sa1, sa2]) {
    const sx = cx + haloRx * Math.cos(a), sy = cy + haloRy * Math.sin(a);
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, w * 0.05);
    sg.addColorStop(0, 'rgba(210,220,255,0.9)');
    sg.addColorStop(0.4, 'rgba(170,190,255,0.4)');
    sg.addColorStop(1, 'rgba(140,160,255,0)');
    ctx.globalAlpha = pulse * haloFlare;
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, w * 0.05, 0, TAU); ctx.fill();
  }
  ctx.restore();

  // Crystal body
  // Build triangulated faces from 8 vertices
  const pts = verts.map(v => ({ x: cx + v.x * scale, y: cy + v.y * scale }));

  // Faces: top (0,1,2,3), front-left (0,3,7,4), front-right (0,1,5,4)
  // back-left (2,3,7,6), back-right (1,2,6,5), bottom (4,5,6,7)
  const faces = [
    { idx: [0,1,2,3], light: 0.9 },  // top
    { idx: [3,0,4,7], light: 0.6 },   // left
    { idx: [1,0,4,5], light: 0.5 },   // front
    { idx: [2,1,5,6], light: 0.7 },   // right
    { idx: [3,2,6,7], light: 0.4 },   // back
    { idx: [4,5,6,7], light: 0.3 },   // bottom
  ];

  // Sort by average y (painter's algorithm)
  faces.sort((a, b) => {
    const ay = a.idx.reduce((s, i) => s + pts[i].y, 0) / a.idx.length;
    const by = b.idx.reduce((s, i) => s + pts[i].y, 0) / b.idx.length;
    return ay - by;
  });

  faces.forEach(face => {
    const fp = face.idx.map(i => pts[i]);
    const l = face.light;

    // Face gradient
    const minY = Math.min(...fp.map(p => p.y));
    const maxY = Math.max(...fp.map(p => p.y));
    const grad = ctx.createLinearGradient(cx, minY, cx, maxY);
    grad.addColorStop(0, `rgba(${Math.round(90+l*100)},${Math.round(140+l*80)},${Math.round(200+l*55)},${0.5+l*0.35})`);
    grad.addColorStop(1, `rgba(${Math.round(30+l*60)},${Math.round(60+l*50)},${Math.round(110+l*50)},${0.4+l*0.3})`);

    ctx.beginPath();
    fp.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = `rgba(120,160,230,${0.2+l*0.4})`;
    ctx.lineWidth = Math.max(0.5, w * 0.003);
    ctx.stroke();
  });

  // Inner refraction lines
  ctx.save();
  ctx.globalAlpha = 0.12 + morphPhase * 0.15;
  ctx.strokeStyle = '#B0DDFF';
  ctx.lineWidth = Math.max(0.5, w * 0.004);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  ctx.lineTo(pts[6].x, pts[6].y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pts[1].x, pts[1].y);
  ctx.lineTo(pts[7].x, pts[7].y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pts[3].x, pts[3].y);
  ctx.lineTo(pts[5].x, pts[5].y);
  ctx.stroke();
  ctx.restore();

  // Specular highlight
  const hlGrad = ctx.createRadialGradient(cx - scale*0.12, cy - scale*0.2, 0, cx - scale*0.12, cy - scale*0.2, scale*0.2);
  hlGrad.addColorStop(0, 'rgba(230,245,255,0.55)');
  hlGrad.addColorStop(0.3, 'rgba(200,225,255,0.25)');
  hlGrad.addColorStop(1, 'rgba(200,225,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath(); ctx.arc(cx - scale*0.12, cy - scale*0.2, scale*0.2, 0, TAU); ctx.fill();

  // Bright dot
  const dotGrad = ctx.createRadialGradient(cx - scale*0.1, cy - scale*0.22, 0, cx - scale*0.1, cy - scale*0.22, scale*0.05);
  dotGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
  dotGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = dotGrad;
  ctx.beginPath(); ctx.arc(cx - scale*0.1, cy - scale*0.22, scale*0.05, 0, TAU); ctx.fill();

  // Edge glow (pulsing)
  ctx.save();
  ctx.globalAlpha = 0.08 + 0.06 * Math.sin(time * 2) + morphPhase * 0.2;
  const eGrad = ctx.createRadialGradient(cx, cy, scale*0.2, cx, cy, scale*0.6);
  eGrad.addColorStop(0, 'rgba(100,140,255,0)');
  eGrad.addColorStop(0.7, 'rgba(100,140,255,0)');
  eGrad.addColorStop(1, 'rgba(130,170,255,0.6)');
  ctx.fillStyle = eGrad;
  ctx.beginPath(); ctx.arc(cx, cy, scale*0.6, 0, TAU); ctx.fill();
  ctx.restore();

  // Particles
  particles.forEach(p => {
    if (p.life <= 0) return;
    const alpha = p.life;
    const px2 = cx + p.x * scale, py2 = cy + p.y * scale;
    const pSize = p.size * scale;
    const pGrad = ctx.createRadialGradient(px2, py2, 0, px2, py2, pSize);
    if (p.bright) {
      pGrad.addColorStop(0, `rgba(220,235,255,${alpha})`);
      pGrad.addColorStop(0.3, `rgba(180,200,255,${alpha*0.6})`);
    } else {
      pGrad.addColorStop(0, `rgba(160,180,255,${alpha*0.8})`);
      pGrad.addColorStop(0.3, `rgba(130,160,255,${alpha*0.4})`);
    }
    pGrad.addColorStop(1, 'rgba(130,160,255,0)');
    ctx.fillStyle = pGrad;
    ctx.beginPath(); ctx.arc(px2, py2, pSize, 0, TAU); ctx.fill();
  });
}

// ===== Animation Loop =====
const HOLD = 2500;
const EXPLODE = 600;  // explode outward
const CONVERGE = 600; // converge to new shape
const CYCLE = HOLD + EXPLODE + CONVERGE;

let lastTransition = -1;

const canvases = [
  { id: 'main-canvas', w: 320, h: 320 },
  { id: 'nav-canvas', w: 64, h: 64 },
  { id: 'hero-canvas', w: 240, h: 240 },
];

function animate(timestamp) {
  const time = timestamp / 1000;
  const elapsed = timestamp % (CYCLE * 3);
  const cycleIdx = Math.floor(elapsed / CYCLE);
  const posInCycle = elapsed - cycleIdx * CYCLE;

  const fromIdx = cycleIdx % 3;
  const toIdx = (cycleIdx + 1) % 3;
  const from = shapeVerts[fromIdx];
  const to = shapeVerts[toIdx];

  let currentVerts, labelText, morphPhase = 0;

  if (posInCycle < HOLD) {
    // Hold steady
    currentVerts = from;
    labelText = shapeNames[fromIdx];
  } else if (posInCycle < HOLD + EXPLODE) {
    // Phase 1: Explode outward to starburst
    const rawT = (posInCycle - HOLD) / EXPLODE;
    const t = easeOutExpo(rawT);
    morphPhase = t;

    const star = getStarburstVerts(cycleIdx * 137 + fromIdx * 31);
    currentVerts = lerpVerts(from, star, t);
    labelText = '—';

    // Trigger particles at start
    if (cycleIdx !== lastTransition) {
      lastTransition = cycleIdx;
      spawnBurst(30);
    }
    // Continuous small burst during explode
    if (Math.random() < 0.3) spawnBurst(2);

  } else {
    // Phase 2: Converge from starburst to new shape
    const rawT = (posInCycle - HOLD - EXPLODE) / CONVERGE;
    const t = easeInOutCubic(rawT);
    morphPhase = 1 - t;

    const star = getStarburstVerts(cycleIdx * 137 + fromIdx * 31);
    currentVerts = lerpVerts(star, to, t);
    labelText = rawT > 0.6 ? shapeNames[toIdx] : '—';

    // Converge particles
    if (rawT < 0.3 && Math.random() < 0.4) spawnConverge(3);
  }

  updateParticles();

  const label = document.getElementById('form-label');
  label.textContent = labelText;
  label.style.opacity = labelText === '—' ? '0.4' : '1';

  canvases.forEach(({ id, w, h }) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    drawShape(canvas.getContext('2d'), w, h, currentVerts, time, morphPhase);
  });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
