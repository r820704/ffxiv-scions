<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozma Logo — 質感比較</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#12101c;color:#e8e0d0;font-family:'Noto Sans TC',sans-serif;padding:20px}
  h1{text-align:center;font-size:1.2rem;color:#C5B69D;font-family:'LXGW WenKai',serif;margin-bottom:4px}
  .page-sub{text-align:center;color:#6a5e4a;font-size:0.75rem;margin-bottom:20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:860px;margin:0 auto}
  @media(max-width:600px){.grid{grid-template-columns:1fr;max-width:400px}}
  .cell{background:#1a1528;border:1px solid #2a2440;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:border-color 0.3s}
  .cell:hover{border-color:#C5B69D40}
  .cell.selected{border-color:#C5B69D;box-shadow:0 0 20px rgba(197,182,157,0.15)}
  .cell-label{font-size:0.85rem;color:#C5B69D;font-weight:600;margin-bottom:4px;font-family:'LXGW WenKai',serif}
  .cell-desc{font-size:0.68rem;color:#6a5e4a;margin-bottom:12px;line-height:1.5}
  .cell canvas{display:block;margin:0 auto}
  .form-label{font-size:0.7rem;color:#6a5e4a;margin-top:8px}
  .navbar-row{max-width:860px;margin:20px auto 0;display:flex;gap:16px;flex-wrap:wrap}
  .nav-demo{flex:1;min-width:300px;background:linear-gradient(180deg,#1a1528,#161220);border:1px solid #2a2440;border-radius:10px;padding:0 16px;height:48px;display:flex;align-items:center;gap:8px;position:relative;overflow:hidden}
  .nav-demo::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#C5B69D40,transparent)}
  .nav-logo-text{font-family:'LXGW WenKai',serif;font-size:0.9rem;font-weight:700;color:#C5B69D}
  .nav-link{padding:4px 10px;font-size:0.75rem;color:#8a7e6a;border-radius:6px;margin-left:4px}
  .nav-link.active{color:#C5B69D;background:#252040}
  .nav-label{font-size:0.65rem;color:#6a5e4a;margin-bottom:4px;text-align:center}
</style>
</head>
<body>
<h1>奧茲瑪 Logo — 質感比較</h1>
<p class="page-sub">點選喜歡的版本（都使用深色底，無彩色光帶）</p>

<div class="grid">
  <div class="cell" onclick="selectCell(this,'A')">
    <div class="cell-label">A. 深淵黑曜</div>
    <div class="cell-desc">近乎純黑，極深的紫色內光，<br>乾淨銳利的邊緣高光</div>
    <canvas id="cA" width="300" height="300" style="width:150px;height:150px;"></canvas>
    <div class="form-label" id="labelA">立方體</div>
  </div>
  <div class="cell" onclick="selectCell(this,'B')">
    <div class="cell-label">B. 暗晶稜鏡</div>
    <div class="cell-desc">深色寶石質感，內部有微弱的<br>折射色彩，像暗色水晶球</div>
    <canvas id="cB" width="300" height="300" style="width:150px;height:150px;"></canvas>
    <div class="form-label" id="labelB">立方體</div>
  </div>
  <div class="cell" onclick="selectCell(this,'C')">
    <div class="cell-label">C. 星雲暗石</div>
    <div class="cell-desc">深色底+極淡的星雲色霧緩慢<br>流動，像從石頭深處透出的光</div>
    <canvas id="cC" width="300" height="300" style="width:150px;height:150px;"></canvas>
    <div class="form-label" id="labelC">立方體</div>
  </div>
  <div class="cell" onclick="selectCell(this,'D')">
    <div class="cell-label">D. 暗鋼光澤</div>
    <div class="cell-desc">深色金屬質感，強烈鏡面高光，<br>帶金色邊緣反射</div>
    <canvas id="cD" width="300" height="300" style="width:150px;height:150px;"></canvas>
    <div class="form-label" id="labelD">立方體</div>
  </div>
</div>

<div class="navbar-row" id="navRow">
  <div style="flex:1;min-width:300px">
    <div class="nav-label" id="navLabel">NavBar 預覽（選擇後顯示）</div>
    <div class="nav-demo">
      <canvas id="cNav" width="72" height="72" style="width:28px;height:28px;"></canvas>
      <span class="nav-logo-text">FFXIV 工具箱</span>
      <span class="nav-link active">天氣查詢</span>
      <span class="nav-link">文理技能</span>
    </div>
  </div>
</div>

<script>
const TAU = Math.PI * 2;
let selectedStyle = null;

function selectCell(el, style) {
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedStyle = style;
  document.getElementById('navLabel').textContent = `NavBar 預覽（${style} 風格）`;
}

// ===== Particles =====
let particles = [];
function spawnSpark(n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*TAU, sp = 0.003+Math.random()*0.01;
    particles.push({x:(Math.random()-0.5)*0.1,y:(Math.random()-0.5)*0.1,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.01+Math.random()*0.015,
      size:0.01+Math.random()*0.03,
      color: ['#FFFFFF','#C0C8E0','#A0A8C0','#D0D4E8','#B8BCD0'][Math.floor(Math.random()*5)]
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});
}

function mulberry32(a) {
  return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}
}
function easeOutExpo(t){return t===1?1:1-Math.pow(2,-10*t);}
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function drawPoly(ctx, pts, fill, stroke) {
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}
}

// ===== Halo =====
function drawHalo(ctx, cx, cy, rx, ry, time, intensity) {
  const pulse = 0.5 + 0.35*Math.sin(time*1.5);
  const I = pulse * intensity;
  ctx.save();
  ctx.globalAlpha = I * 0.25;
  ctx.strokeStyle = 'rgba(180,200,255,0.35)';
  ctx.lineWidth = rx*0.08;
  ctx.beginPath();ctx.ellipse(cx,cy,rx*1.06,ry*1.06,0,0,TAU);ctx.stroke();
  ctx.globalAlpha = I * 0.85;
  ctx.strokeStyle = 'rgba(220,230,255,0.85)';
  ctx.lineWidth = rx*0.02;
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,TAU);ctx.stroke();
  for (const off of [0, Math.PI]) {
    const a = time*0.9 + off;
    const sx = cx+rx*Math.cos(a), sy = cy+ry*Math.sin(a);
    const g = ctx.createRadialGradient(sx,sy,0,sx,sy,rx*0.1);
    g.addColorStop(0,`rgba(255,255,255,${I})`);
    g.addColorStop(0.3,`rgba(200,210,255,${I*0.5})`);
    g.addColorStop(1,'rgba(140,160,255,0)');
    ctx.globalAlpha = I;
    ctx.fillStyle = g;
    ctx.beginPath();ctx.arc(sx,sy,rx*0.1,0,TAU);ctx.fill();
  }
  ctx.restore();
}

// ===============================
// STYLE A: Obsidian Void (深淵黑曜)
// Very dark, near-black with deep purple inner glow, sharp white edge highlights
// ===============================

function drawCubeA(ctx, cx, cy, s, alpha, time) {
  const w = s*0.28, h = s*0.42;
  const topPts = [{x:cx,y:cy-h},{x:cx+w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx-w,y:cy-h*0.4}];
  const leftPts = [{x:cx-w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx,y:cy+h*0.7},{x:cx-w,y:cy+h*0.22}];
  const rightPts = [{x:cx+w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx,y:cy+h*0.7},{x:cx+w,y:cy+h*0.22}];
  ctx.save(); ctx.globalAlpha = alpha;

  // Faces - very dark
  let g = ctx.createLinearGradient(cx-w,cy-h*0.4,cx,cy+h*0.7);
  g.addColorStop(0,'rgba(18,14,28,0.95)');g.addColorStop(1,'rgba(8,6,16,0.92)');
  drawPoly(ctx, leftPts, g, 'rgba(40,35,60,0.5)');

  g = ctx.createLinearGradient(cx+w,cy-h*0.4,cx,cy+h*0.7);
  g.addColorStop(0,'rgba(22,18,35,0.92)');g.addColorStop(1,'rgba(10,8,20,0.88)');
  drawPoly(ctx, rightPts, g, 'rgba(40,35,60,0.4)');

  g = ctx.createLinearGradient(cx,cy-h,cx,cy+h*0.08);
  g.addColorStop(0,'rgba(30,25,48,0.95)');g.addColorStop(1,'rgba(18,14,32,0.9)');
  drawPoly(ctx, topPts, g, 'rgba(55,48,80,0.5)');

  // Deep purple core glow
  ctx.globalAlpha = alpha * 0.2;
  const coreG = ctx.createRadialGradient(cx,cy-h*0.1,0,cx,cy-h*0.1,s*0.25);
  coreG.addColorStop(0,'rgba(80,40,120,0.6)');
  coreG.addColorStop(1,'rgba(40,20,60,0)');
  ctx.fillStyle = coreG;ctx.beginPath();ctx.arc(cx,cy-h*0.1,s*0.25,0,TAU);ctx.fill();

  // Sharp edge highlights - bright white
  ctx.globalAlpha = alpha * 0.7;
  ctx.strokeStyle = 'rgba(220,215,240,0.8)';ctx.lineWidth = 1.8;
  ctx.beginPath();ctx.moveTo(cx,cy-h);ctx.lineTo(cx+w,cy-h*0.4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-h);ctx.lineTo(cx-w,cy-h*0.4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+h*0.08);ctx.lineTo(cx,cy+h*0.7);ctx.stroke();
  // Outer edges
  ctx.globalAlpha = alpha * 0.35;ctx.lineWidth = 1;
  ctx.beginPath();ctx.moveTo(cx-w,cy-h*0.4);ctx.lineTo(cx-w,cy+h*0.22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+w,cy-h*0.4);ctx.lineTo(cx+w,cy+h*0.22);ctx.stroke();

  // Specular highlight
  ctx.globalAlpha = alpha * 0.8;
  const hlG = ctx.createRadialGradient(cx-w*0.2,cy-h*0.7,0,cx-w*0.2,cy-h*0.7,s*0.08);
  hlG.addColorStop(0,'rgba(255,255,255,0.95)');hlG.addColorStop(0.3,'rgba(200,195,220,0.5)');hlG.addColorStop(1,'rgba(200,195,220,0)');
  ctx.fillStyle = hlG;ctx.beginPath();ctx.arc(cx-w*0.2,cy-h*0.7,s*0.08,0,TAU);ctx.fill();

  // Moving sparkle
  const spX = cx+Math.sin(time*1.3)*w*0.4, spY = cy-h*0.5+Math.cos(time*0.9)*h*0.15;
  ctx.globalAlpha = alpha * 0.5;
  const spG = ctx.createRadialGradient(spX,spY,0,spX,spY,s*0.04);
  spG.addColorStop(0,'rgba(255,255,255,1)');spG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = spG;ctx.beginPath();ctx.arc(spX,spY,s*0.04,0,TAU);ctx.fill();

  ctx.restore();
}

function drawPyramidA(ctx, cx, cy, s, alpha, time) {
  const w = s*0.4, topY = cy-s*0.25, botY = cy+s*0.4;
  const midY = topY + (botY-topY)*0.12;
  const leftFace = [{x:cx-w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];
  const rightFace = [{x:cx+w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];
  const topFace = [{x:cx-w,y:topY},{x:cx+w,y:topY},{x:cx+w*0.06,y:midY},{x:cx-w*0.06,y:midY}];
  ctx.save(); ctx.globalAlpha = alpha;

  let g = ctx.createLinearGradient(cx-w,topY,cx,botY);
  g.addColorStop(0,'rgba(22,18,35,0.95)');g.addColorStop(1,'rgba(8,6,18,0.88)');
  drawPoly(ctx, leftFace, g, 'rgba(40,35,60,0.5)');
  g = ctx.createLinearGradient(cx+w,topY,cx,botY);
  g.addColorStop(0,'rgba(18,14,30,0.9)');g.addColorStop(1,'rgba(6,4,14,0.82)');
  drawPoly(ctx, rightFace, g, 'rgba(35,30,55,0.4)');
  g = ctx.createLinearGradient(cx,topY,cx,midY);
  g.addColorStop(0,'rgba(35,28,55,0.95)');g.addColorStop(1,'rgba(22,18,38,0.9)');
  drawPoly(ctx, topFace, g, 'rgba(60,52,85,0.5)');

  ctx.globalAlpha = alpha * 0.2;
  const coreG = ctx.createRadialGradient(cx,cy+s*0.08,0,cx,cy+s*0.08,s*0.2);
  coreG.addColorStop(0,'rgba(80,40,120,0.5)');coreG.addColorStop(1,'rgba(40,20,60,0)');
  ctx.fillStyle = coreG;ctx.beginPath();ctx.arc(cx,cy+s*0.08,s*0.2,0,TAU);ctx.fill();

  ctx.globalAlpha = alpha * 0.7;ctx.strokeStyle = 'rgba(220,215,240,0.8)';ctx.lineWidth = 1.8;
  ctx.beginPath();ctx.moveTo(cx-w,topY);ctx.lineTo(cx+w,topY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-w,topY);ctx.lineTo(cx,botY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+w,topY);ctx.lineTo(cx,botY);ctx.stroke();

  ctx.globalAlpha = alpha * 0.75;
  const hlG = ctx.createRadialGradient(cx-w*0.3,topY+4,0,cx-w*0.3,topY+4,s*0.08);
  hlG.addColorStop(0,'rgba(255,255,255,0.95)');hlG.addColorStop(0.3,'rgba(200,195,220,0.5)');hlG.addColorStop(1,'rgba(200,195,220,0)');
  ctx.fillStyle = hlG;ctx.beginPath();ctx.arc(cx-w*0.3,topY+4,s*0.08,0,TAU);ctx.fill();

  ctx.restore();
}

function drawSphereA(ctx, cx, cy, s, alpha, time) {
  const r = s*0.36;
  ctx.save(); ctx.globalAlpha = alpha;

  const g = ctx.createRadialGradient(cx-r*0.25,cy-r*0.25,r*0.05,cx,cy,r);
  g.addColorStop(0,'rgba(28,22,45,0.97)');g.addColorStop(0.5,'rgba(15,12,28,0.95)');
  g.addColorStop(0.85,'rgba(8,6,18,0.92)');g.addColorStop(1,'rgba(4,3,10,0.88)');
  ctx.fillStyle = g;ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.fill();
  ctx.strokeStyle = 'rgba(50,42,75,0.6)';ctx.lineWidth = 1;ctx.stroke();

  // Deep purple glow
  ctx.globalAlpha = alpha * 0.2;
  const iG = ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.6);
  iG.addColorStop(0,'rgba(80,40,120,0.5)');iG.addColorStop(1,'rgba(40,20,60,0)');
  ctx.fillStyle = iG;ctx.beginPath();ctx.arc(cx,cy,r*0.6,0,TAU);ctx.fill();

  // Specular
  ctx.globalAlpha = alpha * 0.85;
  const hlG = ctx.createRadialGradient(cx-r*0.3,cy-r*0.35,0,cx-r*0.3,cy-r*0.35,r*0.3);
  hlG.addColorStop(0,'rgba(255,255,255,0.9)');hlG.addColorStop(0.15,'rgba(230,225,245,0.5)');hlG.addColorStop(0.4,'rgba(200,195,220,0.15)');hlG.addColorStop(1,'rgba(200,195,220,0)');
  ctx.fillStyle = hlG;ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.35,r*0.3,0,TAU);ctx.fill();

  // Hot dot
  ctx.globalAlpha = alpha * 0.95;
  const dG = ctx.createRadialGradient(cx-r*0.25,cy-r*0.38,0,cx-r*0.25,cy-r*0.38,r*0.07);
  dG.addColorStop(0,'rgba(255,255,255,1)');dG.addColorStop(0.5,'rgba(255,255,255,0.4)');dG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = dG;ctx.beginPath();ctx.arc(cx-r*0.25,cy-r*0.38,r*0.07,0,TAU);ctx.fill();

  // Rim
  ctx.globalAlpha = alpha * 0.3;ctx.strokeStyle = 'rgba(120,110,160,0.5)';ctx.lineWidth = 1.5;
  ctx.beginPath();ctx.arc(cx,cy,r-1,4.5,5.8);ctx.stroke();

  ctx.restore();
}

// ===============================
// STYLE B: Dark Crystal Prism (暗晶稜鏡)
// Dark gemstone with subtle internal refraction colors
// ===============================

function drawCubeB(ctx, cx, cy, s, alpha, time) {
  const w = s*0.28, h = s*0.42;
  const topPts = [{x:cx,y:cy-h},{x:cx+w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx-w,y:cy-h*0.4}];
  const leftPts = [{x:cx-w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx,y:cy+h*0.7},{x:cx-w,y:cy+h*0.22}];
  const rightPts = [{x:cx+w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx,y:cy+h*0.7},{x:cx+w,y:cy+h*0.22}];
  ctx.save(); ctx.globalAlpha = alpha;

  // Faces with subtle color shifts
  let g = ctx.createLinearGradient(cx-w,cy-h*0.4,cx,cy+h*0.7);
  g.addColorStop(0,'rgba(20,18,38,0.95)');g.addColorStop(0.5,'rgba(15,20,35,0.9)');g.addColorStop(1,'rgba(10,8,22,0.92)');
  drawPoly(ctx, leftPts, g, 'rgba(45,50,80,0.5)');

  g = ctx.createLinearGradient(cx+w,cy-h*0.4,cx,cy+h*0.7);
  g.addColorStop(0,'rgba(25,20,40,0.92)');g.addColorStop(0.5,'rgba(20,15,38,0.88)');g.addColorStop(1,'rgba(12,10,25,0.85)');
  drawPoly(ctx, rightPts, g, 'rgba(42,45,75,0.4)');

  g = ctx.createLinearGradient(cx,cy-h,cx,cy+h*0.08);
  g.addColorStop(0,'rgba(35,30,55,0.95)');g.addColorStop(0.5,'rgba(28,25,48,0.9)');g.addColorStop(1,'rgba(20,18,38,0.88)');
  drawPoly(ctx, topPts, g, 'rgba(60,55,90,0.5)');

  // Subtle refraction patches - very muted colors inside
  ctx.save();
  ctx.beginPath();
  topPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();
  leftPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();
  rightPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();
  ctx.clip();

  // Slow-drifting muted color blobs
  const colors = ['rgba(60,40,90,','rgba(30,50,70,','rgba(50,30,60,'];
  colors.forEach((c,i) => {
    const bx = cx + Math.sin(time*0.3+i*2.1)*w*0.5;
    const by = cy + Math.cos(time*0.25+i*1.7)*h*0.3 - h*0.15;
    ctx.globalAlpha = alpha * 0.15;
    const bG = ctx.createRadialGradient(bx,by,0,bx,by,s*0.15);
    bG.addColorStop(0,c+'0.6)');bG.addColorStop(1,c+'0)');
    ctx.fillStyle = bG;ctx.beginPath();ctx.arc(bx,by,s*0.15,0,TAU);ctx.fill();
  });
  ctx.restore();

  // Edge highlights with slight prismatic shift
  ctx.globalAlpha = alpha * 0.55;
  ctx.strokeStyle = 'rgba(180,190,220,0.7)';ctx.lineWidth = 1.5;
  ctx.beginPath();ctx.moveTo(cx,cy-h);ctx.lineTo(cx+w,cy-h*0.4);ctx.stroke();
  ctx.strokeStyle = 'rgba(190,180,215,0.7)';
  ctx.beginPath();ctx.moveTo(cx,cy-h);ctx.lineTo(cx-w,cy-h*0.4);ctx.stroke();
  ctx.strokeStyle = 'rgba(175,185,225,0.6)';
  ctx.beginPath();ctx.moveTo(cx,cy+h*0.08);ctx.lineTo(cx,cy+h*0.7);ctx.stroke();

  // Specular
  ctx.globalAlpha = alpha * 0.7;
  const hlG = ctx.createRadialGradient(cx-w*0.2,cy-h*0.68,0,cx-w*0.2,cy-h*0.68,s*0.09);
  hlG.addColorStop(0,'rgba(255,255,255,0.9)');hlG.addColorStop(0.3,'rgba(210,205,230,0.4)');hlG.addColorStop(1,'rgba(210,205,230,0)');
  ctx.fillStyle = hlG;ctx.beginPath();ctx.arc(cx-w*0.2,cy-h*0.68,s*0.09,0,TAU);ctx.fill();

  // Secondary subtle colored highlight

  // Secondary specular on right face
  ctx.globalAlpha = alpha * 0.35;
  const h2G = ctx.createRadialGradient(cx+w*0.5,cy-h*0.15,0,cx+w*0.5,cy-h*0.15,s*0.06);
  h2G.addColorStop(0,'rgba(255,252,240,0.8)');h2G.addColorStop(1,'rgba(255,252,240,0)');
  ctx.fillStyle = h2G;ctx.beginPath();ctx.arc(cx+w*0.5,cy-h*0.15,s*0.06,0,TAU);ctx.fill();

  ctx.restore();
}

function drawPyramidD(ctx, cx, cy, s, alpha, time) {
  const w = s*0.4, topY = cy-s*0.25, botY = cy+s*0.4;
  const midY = topY + (botY-topY)*0.12;
  const leftFace = [{x:cx-w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];
  const rightFace = [{x:cx+w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];
  const topFace = [{x:cx-w,y:topY},{x:cx+w,y:topY},{x:cx+w*0.06,y:midY},{x:cx-w*0.06,y:midY}];
  ctx.save(); ctx.globalAlpha = alpha;

  let g = ctx.createLinearGradient(cx-w,topY,cx,botY);
  g.addColorStop(0,'rgba(38,38,45,0.95)');g.addColorStop(0.5,'rgba(25,25,32,0.92)');g.addColorStop(1,'rgba(16,16,22,0.88)');
  drawPoly(ctx, leftFace, g, 'rgba(55,55,65,0.5)');
  g = ctx.createLinearGradient(cx+w,topY,cx,botY);
  g.addColorStop(0,'rgba(32,32,40,0.92)');g.addColorStop(1,'rgba(14,14,20,0.85)');
  drawPoly(ctx, rightFace, g, 'rgba(50,50,60,0.4)');
  g = ctx.createLinearGradient(cx,topY,cx,midY);
  g.addColorStop(0,'rgba(58,58,68,0.95)');g.addColorStop(1,'rgba(38,38,48,0.9)');
  drawPoly(ctx, topFace, g, 'rgba(72,72,85,0.5)');

  // Sheen
  ctx.save();ctx.beginPath();
  leftFace.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();
  rightFace.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.clip();
  const sheenY = topY + (botY-topY) * ((Math.sin(time*0.45)+1)/2);
  ctx.globalAlpha = alpha * 0.12;
  const shG = ctx.createLinearGradient(cx-w,sheenY-s*0.06,cx+w,sheenY+s*0.06);
  shG.addColorStop(0,'rgba(255,255,255,0)');shG.addColorStop(0.45,'rgba(255,255,255,0.7)');
  shG.addColorStop(0.55,'rgba(255,255,255,0.7)');shG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = shG;ctx.fillRect(cx-w-5,sheenY-s*0.05,w*2+10,s*0.1);
  ctx.restore();

  // Gold edges
  ctx.globalAlpha = alpha * 0.6;ctx.strokeStyle = 'rgba(197,182,157,0.7)';ctx.lineWidth = 1.8;
  ctx.beginPath();ctx.moveTo(cx-w,topY);ctx.lineTo(cx+w,topY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-w,topY);ctx.lineTo(cx,botY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+w,topY);ctx.lineTo(cx,botY);ctx.stroke();

  ctx.globalAlpha = alpha * 0.8;
  const hlG = ctx.createRadialGradient(cx-w*0.3,topY+4,0,cx-w*0.3,topY+4,s*0.09);
  hlG.addColorStop(0,'rgba(255,255,255,0.95)');hlG.addColorStop(0.3,'rgba(230,225,215,0.45)');hlG.addColorStop(1,'rgba(230,225,215,0)');
  ctx.fillStyle = hlG;ctx.beginPath();ctx.arc(cx-w*0.3,topY+4,s*0.09,0,TAU);ctx.fill();

  ctx.restore();
}

function drawSphereD(ctx, cx, cy, s, alpha, time) {
  const r = s*0.36;
  ctx.save(); ctx.globalAlpha = alpha;

  // Metallic sphere
  const g = ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.05,cx,cy,r);
  g.addColorStop(0,'rgba(58,58,68,0.97)');g.addColorStop(0.3,'rgba(38,38,48,0.95)');
  g.addColorStop(0.7,'rgba(22,22,30,0.92)');g.addColorStop(1,'rgba(14,14,20,0.88)');
  ctx.fillStyle = g;ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.fill();
  ctx.strokeStyle = 'rgba(60,58,68,0.6)';ctx.lineWidth = 1;ctx.stroke();

  // Moving metallic sheen
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r-2,0,TAU);ctx.clip();
  const sheenA = time*0.4;
  const sx1 = cx + Math.cos(sheenA)*r*0.5, sy1 = cy + Math.sin(sheenA)*r*0.3;
  ctx.globalAlpha = alpha * 0.1;
  const shG = ctx.createRadialGradient(sx1,sy1,0,sx1,sy1,r*0.6);
  shG.addColorStop(0,'rgba(255,255,255,0.5)');shG.addColorStop(0.3,'rgba(200,195,185,0.2)');shG.addColorStop(1,'rgba(200,195,185,0)');
  ctx.fillStyle = shG;ctx.beginPath();ctx.arc(sx1,sy1,r*0.6,0,TAU);ctx.fill();
  ctx.restore();

  // Strong specular
  ctx.globalAlpha = alpha * 0.9;
  const hlG = ctx.createRadialGradient(cx-r*0.3,cy-r*0.35,0,cx-r*0.3,cy-r*0.35,r*0.28);
  hlG.addColorStop(0,'rgba(255,255,255,0.95)');hlG.addColorStop(0.12,'rgba(240,238,230,0.55)');hlG.addColorStop(0.35,'rgba(220,215,205,0.15)');hlG.addColorStop(1,'rgba(220,215,205,0)');
  ctx.fillStyle = hlG;ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.35,r*0.28,0,TAU);ctx.fill();

  // Hot dot
  ctx.globalAlpha = alpha;
  const dG = ctx.createRadialGradient(cx-r*0.25,cy-r*0.38,0,cx-r*0.25,cy-r*0.38,r*0.08);
  dG.addColorStop(0,'rgba(255,255,255,1)');dG.addColorStop(0.4,'rgba(255,252,240,0.5)');dG.addColorStop(1,'rgba(255,252,240,0)');
  ctx.fillStyle = dG;ctx.beginPath();ctx.arc(cx-r*0.25,cy-r*0.38,r*0.08,0,TAU);ctx.fill();

  // Gold rim
  ctx.globalAlpha = alpha * 0.3;ctx.strokeStyle = 'rgba(197,182,157,0.5)';ctx.lineWidth = 1.5;
  ctx.beginPath();ctx.arc(cx,cy,r-1,4.2,6.0);ctx.stroke();

  // Bottom reflection
  ctx.globalAlpha = alpha * 0.15;
  const brG = ctx.createRadialGradient(cx+r*0.15,cy+r*0.3,0,cx+r*0.15,cy+r*0.3,r*0.2);
  brG.addColorStop(0,'rgba(255,252,240,0.4)');brG.addColorStop(1,'rgba(255,252,240,0)');
  ctx.fillStyle = brG;ctx.beginPath();ctx.arc(cx+r*0.15,cy+r*0.3,r*0.2,0,TAU);ctx.fill();

  ctx.restore();
}

// ===== Starburst (shared, no swirls) =====
function drawStarburst(ctx, cx, cy, s, alpha, time, seed, style) {
  const rng = mulberry32(seed);
  const spikes = 10+Math.floor(rng()*4);
  const pts = [];
  for (let i = 0; i < spikes; i++) {
    const a = TAU*i/spikes + (rng()-0.5)*0.3;
    const outerR = s*(0.28+rng()*0.2);
    const innerR = s*(0.06+rng()*0.08);
    pts.push({x:cx+outerR*Math.cos(a),y:cy+outerR*Math.sin(a)});
    const a2 = a+TAU/spikes*0.5;
    pts.push({x:cx+innerR*Math.cos(a2),y:cy+innerR*Math.sin(a2)});
  }

  ctx.save();ctx.globalAlpha = alpha;

  // Fill varies by style
  let fillC1, fillC2, edgeC;
  if (style === 'A') {
    fillC1 = 'rgba(25,20,40,0.9)'; fillC2 = 'rgba(10,8,20,0.6)'; edgeC = 'rgba(60,50,90,0.5)';
  } else if (style === 'B') {
    fillC1 = 'rgba(28,25,48,0.9)'; fillC2 = 'rgba(12,10,25,0.6)'; edgeC = 'rgba(55,50,85,0.5)';
  } else if (style === 'C') {
    fillC1 = 'rgba(30,26,45,0.9)'; fillC2 = 'rgba(14,12,25,0.6)'; edgeC = 'rgba(58,52,80,0.5)';
  } else {
    fillC1 = 'rgba(40,40,48,0.9)'; fillC2 = 'rgba(18,18,24,0.6)'; edgeC = 'rgba(65,65,75,0.5)';
  }

  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,s*0.4);
  g.addColorStop(0,fillC1);g.addColorStop(1,fillC2);
  ctx.fillStyle = g;ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();ctx.fill();
  ctx.strokeStyle = edgeC;ctx.lineWidth = 1;ctx.stroke();

  // Core glow
  ctx.globalAlpha = alpha * 0.9;
  const cG = ctx.createRadialGradient(cx,cy,0,cx,cy,s*0.12);
  cG.addColorStop(0,'rgba(255,255,255,0.95)');cG.addColorStop(0.3,'rgba(200,210,230,0.5)');cG.addColorStop(1,'rgba(150,170,220,0)');
  ctx.fillStyle = cG;ctx.beginPath();ctx.arc(cx,cy,s*0.12,0,TAU);ctx.fill();

  // Spike tips
  ctx.globalAlpha = alpha * 0.6;
  for (let i = 0; i < pts.length; i += 2) {
    const tG = ctx.createRadialGradient(pts[i].x,pts[i].y,0,pts[i].x,pts[i].y,s*0.03);
    tG.addColorStop(0,'rgba(255,255,255,0.9)');tG.addColorStop(1,'rgba(200,210,230,0)');
    ctx.fillStyle = tG;ctx.beginPath();ctx.arc(pts[i].x,pts[i].y,s*0.03,0,TAU);ctx.fill();
  }

  ctx.restore();
}

// ===== Per-style render =====
function renderStyle(ctx, w, h, time, morphState, style) {
  const cx=w/2, cy=h/2, s=w*0.8;
  ctx.clearRect(0,0,w,h);

  // Ambient glow
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,w*0.45);
  bg.addColorStop(0,'rgba(35,30,55,0.1)');bg.addColorStop(1,'rgba(18,16,28,0)');
  ctx.fillStyle = bg;ctx.fillRect(0,0,w,h);

  const drawMap = {
    A: [drawCubeA, drawPyramidA, drawSphereA],
    B: [drawCubeB, drawPyramidB, drawSphereB],
    C: [drawCubeC, drawPyramidC, drawSphereC],
    D: [drawCubeD, drawPyramidD, drawSphereD],
  };

  const {formIdx,phase,t} = morphState;
  const funcs = drawMap[style];
  const nextIdx = (formIdx+1)%3;
  const haloI = phase==='hold'?1:(phase==='explode'?1+t*0.8:1.8-t*0.8);

  drawHalo(ctx,cx,cy,w*0.42,w*0.1,time,haloI);

  if(phase==='hold'){
    funcs[formIdx](ctx,cx,cy,s,1,time);
  }else if(phase==='explode'){
    const et = easeOutExpo(t);
    if(1-et>0.01) funcs[formIdx](ctx,cx,cy,s,1-et,time);
    drawStarburst(ctx,cx,cy,s,et,time,formIdx*137+42,style);
  }else{
    const ct = easeInOutCubic(t);
    drawStarburst(ctx,cx,cy,s,1-ct,time,formIdx*137+42,style);
    if(ct>0.01) funcs[nextIdx](ctx,cx,cy,s,ct,time);
  }

  // Edge glow during morph
  if(phase!=='hold'){
    const intensity = phase==='explode'?t:1-t;
    ctx.save();ctx.globalAlpha=intensity*0.2;
    const eg = ctx.createRadialGradient(cx,cy,s*0.12,cx,cy,s*0.5);
    eg.addColorStop(0,'rgba(100,100,160,0)');eg.addColorStop(0.6,'rgba(100,100,160,0)');
    eg.addColorStop(1,'rgba(140,140,200,0.6)');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(cx,cy,s*0.5,0,TAU);ctx.fill();
    ctx.restore();
  }

  // Particles
  const scale = w*0.75;
  particles.forEach(p=>{
    if(p.life<=0)return;
    const px2=cx+p.x*scale, py2=cy+p.y*scale, pS=p.size*scale;
    ctx.globalAlpha = p.life * 0.8;
    const pg = ctx.createRadialGradient(px2,py2,0,px2,py2,pS);
    pg.addColorStop(0,p.color);pg.addColorStop(1,'rgba(140,140,200,0)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(px2,py2,pS,0,TAU);ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ===== Animation Loop =====
const HOLD=2500, EXPLODE=500, CONVERGE=600, CYCLE=HOLD+EXPLODE+CONVERGE;
const shapeNames=['立方體','倒金字塔','球體'];
let lastTrans=-1;

const configs = [
  {canvas:'cA', label:'labelA', style:'A', w:300, h:300},
  {canvas:'cB', label:'labelB', style:'B', w:300, h:300},
  {canvas:'cC', label:'labelC', style:'C', w:300, h:300},
  {canvas:'cD', label:'labelD', style:'D', w:300, h:300},
];

function animate(ts) {
  const time=ts/1000, elapsed=ts%(CYCLE*3);
  const cycleIdx=Math.floor(elapsed/CYCLE), pos=elapsed-cycleIdx*CYCLE;
  const formIdx=cycleIdx%3, nextIdx=(formIdx+1)%3;
  let morphState, labelText;

  if(pos<HOLD){
    morphState={formIdx,phase:'hold',t:0};labelText=shapeNames[formIdx];
  }else if(pos<HOLD+EXPLODE){
    const t=(pos-HOLD)/EXPLODE;
    morphState={formIdx,phase:'explode',t};labelText='—';
    if(cycleIdx!==lastTrans){lastTrans=cycleIdx;spawnSpark(40);}
    if(Math.random()<0.4)spawnSpark(2);
  }else{
    const t=(pos-HOLD-EXPLODE)/CONVERGE;
    morphState={formIdx,phase:'converge',t};labelText=t>0.5?shapeNames[nextIdx]:'—';
  }

  updateParticles();

  configs.forEach(({canvas,label,style,w:cw,h:ch}) => {
    const c = document.getElementById(canvas);
    if(!c) return;
    renderStyle(c.getContext('2d'),cw,ch,time,morphState,style);
    const lbl = document.getElementById(label);
    if(lbl){lbl.textContent=labelText;lbl.style.opacity=labelText==='—'?'0.3':'1';}
  });

  // Nav canvas uses selected style
  const navC = document.getElementById('cNav');
  if(navC && selectedStyle) {
    renderStyle(navC.getContext('2d'),72,72,time,morphState,selectedStyle);
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
