<body>
<h1>奧茲瑪 Logo — v6</h1>
<p class="page-sub">深色底 + 彩色漩渦光帶 + 閃亮質感</p>
<div class="showcase">
  <div class="anim-box">
    <div class="section-label">動畫效果</div>

    <strong style="color:#C5B69D;">v6 改進：</strong><br>
    • 深色表面（暗灰/深空黑）+ 彩色漩渦光帶（紅/綠/黃/白）<br>
    • 光帶在表面流動，模擬奧茲瑪的大理石紋旋轉<br>
    • 強烈的光澤反射和白色高光<br>
    • 赤道明亮白藍光環<br>
    • 所有三種型態都有相同的暗色 + 彩色光帶質感

<script>
const TAU = Math.PI * 2;

// ===== Particles =====
let particles = [];
function spawnSpark(n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*TAU, sp = 0.003+Math.random()*0.01;
    particles.push({x:(Math.random()-0.5)*0.1,y:(Math.random()-0.5)*0.1,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.01+Math.random()*0.015,
      size:0.01+Math.random()*0.03,
      color: ['#FF6060','#60FF80','#FFFF60','#FFFFFF','#60C0FF'][Math.floor(Math.random()*5)]
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});
}

// ===== Halo =====
function drawHalo(ctx, cx, cy, rx, ry, time, intensity) {
  const pulse = 0.5 + 0.35*Math.sin(time*1.5);
  const I = pulse * intensity;
  ctx.save();
  // Wide soft glow
  ctx.globalAlpha = I * 0.3;
  ctx.strokeStyle = 'rgba(180,200,255,0.4)';
  ctx.lineWidth = rx*0.1;
  ctx.beginPath();ctx.ellipse(cx,cy,rx*1.08,ry*1.08,0,0,TAU);ctx.stroke();
  // Main bright ring
  ctx.globalAlpha = I * 0.9;
  ctx.strokeStyle = 'rgba(220,230,255,0.9)';
  ctx.lineWidth = rx*0.025;
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,TAU);ctx.stroke();
  // Inner line
  ctx.globalAlpha = I * 0.5;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = rx*0.012;
  ctx.beginPath();ctx.ellipse(cx,cy,rx*0.97,ry*0.97,0,0,TAU);ctx.stroke();
  // Rotating bright spots
  for (const off of [0, Math.PI]) {
    const a = time*0.9 + off;
    const sx = cx+rx*Math.cos(a), sy = cy+ry*Math.sin(a);
    const g = ctx.createRadialGradient(sx,sy,0,sx,sy,rx*0.12);
    g.addColorStop(0,`rgba(255,255,255,${I})`);
    g.addColorStop(0.3,`rgba(200,210,255,${I*0.5})`);
    g.addColorStop(1,'rgba(140,160,255,0)');
    ctx.globalAlpha = I;
    ctx.fillStyle = g;
    ctx.beginPath();ctx.arc(sx,sy,rx*0.12,0,TAU);ctx.fill();
  }
  ctx.restore();
}

// ===== Swirl streaks (colorful aurora bands) =====
function drawSwirls(ctx, cx, cy, scale, time, clipFn) {
  ctx.save();
  clipFn(ctx); // Clip to shape
  ctx.globalCompositeOperation = 'screen';

  const streaks = [
    { color: 'rgba(255,60,60,', width: 3, speed: 0.4, offset: 0, amp: 0.3 },
    { color: 'rgba(60,255,100,', width: 2.5, speed: 0.35, offset: 1.5, amp: 0.25 },
    { color: 'rgba(255,255,80,', width: 2, speed: 0.5, offset: 3.0, amp: 0.2 },
    { color: 'rgba(255,255,255,', width: 2, speed: 0.6, offset: 4.5, amp: 0.35 },
    { color: 'rgba(80,180,255,', width: 2, speed: 0.3, offset: 2.0, amp: 0.28 },
    { color: 'rgba(200,60,255,', width: 1.5, speed: 0.45, offset: 5.0, amp: 0.22 },
  ];

  streaks.forEach(s => {
    const t = time * s.speed + s.offset;
    ctx.strokeStyle = s.color + '0.5)';
    ctx.lineWidth = s.width * (scale / 180);
    ctx.lineCap = 'round';

    // Flowing bezier curve
    ctx.beginPath();
    const startX = cx - scale*0.5;
    const startY = cy + Math.sin(t) * scale * s.amp;
    ctx.moveTo(startX, startY);

    for (let i = 1; i <= 4; i++) {
      const px = cx - scale*0.5 + (scale * i / 4);
      const py = cy + Math.sin(t + i * 0.8) * scale * s.amp * (1 - i*0.1);
      const cpx = px - scale*0.12;
      const cpy = cy + Math.sin(t + i * 0.6 + 0.5) * scale * s.amp;
      ctx.quadraticCurveTo(cpx, cpy, px, py);
    }
    ctx.stroke();

    // Brighter thinner core
    ctx.strokeStyle = s.color + '0.8)';
    ctx.lineWidth = s.width * 0.4 * (scale / 180);
    ctx.stroke();
  });

  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}

// ===== Draw Cube =====
function drawCube(ctx, cx, cy, s, alpha, time) {
  const w = s * 0.28, h = s * 0.42;

  const topPts = [{x:cx,y:cy-h},{x:cx+w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx-w,y:cy-h*0.4}];
  const leftPts = [{x:cx-w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx,y:cy+h*0.7},{x:cx-w,y:cy+h*0.22}];
  const rightPts = [{x:cx+w,y:cy-h*0.4},{x:cx,y:cy+h*0.08},{x:cx,y:cy+h*0.7},{x:cx+w,y:cy+h*0.22}];

  ctx.save();
  ctx.globalAlpha = alpha;

  // Left face - dark base
  let g = ctx.createLinearGradient(cx-w,cy-h*0.4,cx,cy+h*0.7);
  g.addColorStop(0,'rgba(35,35,45,0.9)');
  g.addColorStop(1,'rgba(20,20,30,0.85)');
  drawPoly(ctx, leftPts, g, 'rgba(60,70,100,0.4)');

  // Right face - slightly lighter dark
  g = ctx.createLinearGradient(cx+w,cy-h*0.4,cx,cy+h*0.7);
  g.addColorStop(0,'rgba(45,45,55,0.85)');
  g.addColorStop(1,'rgba(25,25,35,0.8)');
  drawPoly(ctx, rightPts, g, 'rgba(60,70,100,0.35)');

  // Top face - brightest dark
  g = ctx.createLinearGradient(cx,cy-h,cx,cy+h*0.08);
  g.addColorStop(0,'rgba(55,55,70,0.9)');
  g.addColorStop(0.5,'rgba(40,40,55,0.85)');
  g.addColorStop(1,'rgba(35,35,50,0.8)');
  drawPoly(ctx, topPts, g, 'rgba(80,90,120,0.5)');

  // Swirl streaks clipped to cube shape
  drawSwirls(ctx, cx, cy, s*0.5, time, (c) => {
    c.beginPath();
    topPts.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();
    leftPts.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();
    rightPts.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();
    c.clip();
  });

  // Edge highlights
  ctx.globalAlpha = alpha * 0.5;
  ctx.strokeStyle = 'rgba(180,200,230,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();ctx.moveTo(cx,cy-h);ctx.lineTo(cx+w,cy-h*0.4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-h);ctx.lineTo(cx-w,cy-h*0.4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+h*0.08);ctx.lineTo(cx,cy+h*0.7);ctx.stroke();

  // Specular highlight
  ctx.globalAlpha = alpha * 0.6;
  const hlG = ctx.createRadialGradient(cx-w*0.2,cy-h*0.65,0,cx-w*0.2,cy-h*0.65,s*0.1);
  hlG.addColorStop(0,'rgba(255,255,255,0.9)');
  hlG.addColorStop(0.3,'rgba(200,210,230,0.4)');
  hlG.addColorStop(1,'rgba(200,210,230,0)');
  ctx.fillStyle = hlG;
  ctx.beginPath();ctx.arc(cx-w*0.2,cy-h*0.65,s*0.1,0,TAU);ctx.fill();

  // Moving shimmer
  const shimX = cx + Math.sin(time*1.2)*w*0.5;
  const shimY = cy - h*0.6 + Math.cos(time*0.8)*h*0.15;
  ctx.globalAlpha = alpha * 0.4;
  const shimG = ctx.createRadialGradient(shimX,shimY,0,shimX,shimY,s*0.06);
  shimG.addColorStop(0,'rgba(255,255,255,1)');
  shimG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = shimG;
  ctx.beginPath();ctx.arc(shimX,shimY,s*0.06,0,TAU);ctx.fill();

  ctx.restore();
}

// ===== Draw Pyramid =====
function drawPyramid(ctx, cx, cy, s, alpha, time) {
  const w = s*0.4, topY = cy-s*0.25, botY = cy+s*0.4;
  const midY = topY + (botY-topY)*0.12;

  const topFace = [{x:cx-w,y:topY},{x:cx+w,y:topY},{x:cx+w*0.06,y:midY},{x:cx-w*0.06,y:midY}];
  const leftFace = [{x:cx-w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];
  const rightFace = [{x:cx+w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];

  ctx.save();
  ctx.globalAlpha = alpha;

  // Left face
  let g = ctx.createLinearGradient(cx-w,topY,cx,botY);
  g.addColorStop(0,'rgba(45,45,60,0.9)');
  g.addColorStop(1,'rgba(20,20,35,0.8)');
  drawPoly(ctx, leftFace, g, 'rgba(60,70,100,0.4)');

  // Right face
  g = ctx.createLinearGradient(cx+w,topY,cx,botY);
  g.addColorStop(0,'rgba(35,35,50,0.85)');
  g.addColorStop(1,'rgba(18,18,30,0.75)');
  drawPoly(ctx, rightFace, g, 'rgba(50,60,90,0.35)');

  // Top face
  g = ctx.createLinearGradient(cx,topY,cx,midY);
  g.addColorStop(0,'rgba(60,60,80,0.95)');
  g.addColorStop(1,'rgba(45,45,65,0.85)');
  drawPoly(ctx, topFace, g, 'rgba(90,100,130,0.5)');

  // Swirls
  drawSwirls(ctx, cx, cy+s*0.05, s*0.45, time+2, (c) => {
    c.beginPath();
    leftFace.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();
    rightFace.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();
    topFace.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();
    c.clip();
  });

  // Edge highlights
  ctx.globalAlpha = alpha * 0.5;
  ctx.strokeStyle = 'rgba(180,200,230,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();ctx.moveTo(cx-w,topY);ctx.lineTo(cx+w,topY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-w,topY);ctx.lineTo(cx,botY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+w,topY);ctx.lineTo(cx,botY);ctx.stroke();

  // Specular
  ctx.globalAlpha = alpha * 0.55;
  const hlG = ctx.createRadialGradient(cx-w*0.3,topY+5,0,cx-w*0.3,topY+5,s*0.1);
  hlG.addColorStop(0,'rgba(255,255,255,0.9)');
  hlG.addColorStop(0.3,'rgba(200,210,230,0.4)');
  hlG.addColorStop(1,'rgba(200,210,230,0)');
  ctx.fillStyle = hlG;
  ctx.beginPath();ctx.arc(cx-w*0.3,topY+5,s*0.1,0,TAU);ctx.fill();

  // Shimmer
  const shimY2 = topY + (botY-topY)*(0.3 + 0.2*Math.sin(time));
  ctx.globalAlpha = alpha * 0.35;
  const shimG2 = ctx.createRadialGradient(cx-w*0.15,shimY2,0,cx-w*0.15,shimY2,s*0.05);
  shimG2.addColorStop(0,'rgba(255,255,255,1)');
  shimG2.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = shimG2;
  ctx.beginPath();ctx.arc(cx-w*0.15,shimY2,s*0.05,0,TAU);ctx.fill();

  ctx.restore();
}

// ===== Draw Sphere =====
function drawSphere(ctx, cx, cy, s, alpha, time) {
  const r = s * 0.36;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Dark sphere body
  const g = ctx.createRadialGradient(cx-r*0.25,cy-r*0.25,r*0.05,cx,cy,r);
  g.addColorStop(0,'rgba(55,55,70,0.95)');
  g.addColorStop(0.4,'rgba(35,35,50,0.9)');
  g.addColorStop(0.8,'rgba(22,22,35,0.85)');
  g.addColorStop(1,'rgba(15,15,25,0.8)');
  ctx.fillStyle = g;
  ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.fill();
  ctx.strokeStyle = 'rgba(70,80,110,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Swirl streaks clipped to circle
  drawSwirls(ctx, cx, cy, r*1.8, time+4, (c) => {
    c.beginPath();c.arc(cx,cy,r-1,0,TAU);c.clip();
  });

  // Equator ring (bright)
  ctx.globalAlpha = alpha * 0.4;
  ctx.strokeStyle = 'rgba(200,220,255,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();ctx.ellipse(cx,cy+r*0.05,r*0.97,r*0.18,0,0,TAU);ctx.stroke();

  // Specular highlight
  ctx.globalAlpha = alpha * 0.7;
  const hlG = ctx.createRadialGradient(cx-r*0.3,cy-r*0.35,0,cx-r*0.3,cy-r*0.35,r*0.35);
  hlG.addColorStop(0,'rgba(255,255,255,0.85)');
  hlG.addColorStop(0.2,'rgba(220,230,245,0.4)');
  hlG.addColorStop(1,'rgba(200,210,230,0)');
  ctx.fillStyle = hlG;
  ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.35,r*0.35,0,TAU);ctx.fill();

  // White hot dot
  ctx.globalAlpha = alpha * 0.9;
  const dotG = ctx.createRadialGradient(cx-r*0.25,cy-r*0.38,0,cx-r*0.25,cy-r*0.38,r*0.1);
  dotG.addColorStop(0,'rgba(255,255,255,1)');
  dotG.addColorStop(0.4,'rgba(255,255,255,0.5)');
  dotG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = dotG;
  ctx.beginPath();ctx.arc(cx-r*0.25,cy-r*0.38,r*0.1,0,TAU);ctx.fill();

  // Rim light
  ctx.globalAlpha = alpha * 0.3;
  ctx.strokeStyle = 'rgba(150,180,230,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();ctx.arc(cx,cy,r-1,4.5,5.8);ctx.stroke();

  ctx.restore();
}

// ===== Starburst =====
function drawStarburst(ctx, cx, cy, s, alpha, time, seed) {
  const rng = mulberry32(seed);
  const spikes = 10+Math.floor(rng()*4);
  const pts = [];
  for (let i = 0; i < spikes; i++) {
    const a = TAU*i/spikes + (rng()-0.5)*0.3;
    const outerR = s*(0.28+rng()*0.2);
    const innerR = s*(0.06+rng()*0.08);
    pts.push({x:cx+outerR*Math.cos(a),y:cy+outerR*Math.sin(a)});
    const a2 = a+TAU/spikes*0.5;
    pts.push({x:cx+innerR*Math.cos(a2),y:cy+innerR*Math.sin(a2)});
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  // Dark fill
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,s*0.4);
  g.addColorStop(0,'rgba(50,50,70,0.9)');
  g.addColorStop(0.5,'rgba(30,30,48,0.8)');
  g.addColorStop(1,'rgba(20,20,35,0.6)');
  ctx.fillStyle = g;
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();ctx.fill();
  ctx.strokeStyle = 'rgba(100,120,180,0.5)';
  ctx.lineWidth = 1;ctx.stroke();

  // Swirls inside starburst
  drawSwirls(ctx, cx, cy, s*0.45, time+1, (c) => {
    c.beginPath();
    pts.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
    c.closePath();c.clip();
  });

  // Bright core
  ctx.globalAlpha = alpha * 0.9;
  const coreG = ctx.createRadialGradient(cx,cy,0,cx,cy,s*0.15);
  coreG.addColorStop(0,'rgba(255,255,255,0.95)');
  coreG.addColorStop(0.3,'rgba(200,220,255,0.5)');
  coreG.addColorStop(1,'rgba(150,180,255,0)');
  ctx.fillStyle = coreG;
  ctx.beginPath();ctx.arc(cx,cy,s*0.15,0,TAU);ctx.fill();

  // Spike tip glows
  ctx.globalAlpha = alpha * 0.6;
  for (let i = 0; i < pts.length; i += 2) {
    const tG = ctx.createRadialGradient(pts[i].x,pts[i].y,0,pts[i].x,pts[i].y,s*0.035);
    tG.addColorStop(0,'rgba(255,255,255,0.9)');
    tG.addColorStop(1,'rgba(200,220,255,0)');
    ctx.fillStyle = tG;
    ctx.beginPath();ctx.arc(pts[i].x,pts[i].y,s*0.035,0,TAU);ctx.fill();
  }

  ctx.restore();
}

function drawPoly(ctx, pts, fill, stroke) {
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}
}

function mulberry32(a) {
  return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}
}

function easeOutExpo(t){return t===1?1:1-Math.pow(2,-10*t);}
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

// ===== Render =====
function render(ctx, w, h, time, morphState) {
  const cx=w/2, cy=h/2, s=w*0.8;
  ctx.clearRect(0,0,w,h);

  // Ambient glow
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,w*0.45);
  bg.addColorStop(0,'rgba(40,40,70,0.12)');
  bg.addColorStop(1,'rgba(18,16,28,0)');
  ctx.fillStyle = bg;ctx.fillRect(0,0,w,h);

  const {formIdx,phase,t} = morphState;
  const drawFuncs = [drawCube,drawPyramid,drawSphere];
  const nextIdx = (formIdx+1)%3;
  const haloI = phase==='hold'?1:(phase==='explode'?1+t*0.8:1.8-t*0.8);

  drawHalo(ctx,cx,cy,w*0.42,w*0.1,time,haloI);

  if(phase==='hold'){
    drawFuncs[formIdx](ctx,cx,cy,s,1,time);
  }else if(phase==='explode'){
    const et = easeOutExpo(t);
    if(1-et>0.01) drawFuncs[formIdx](ctx,cx,cy,s,1-et,time);
    drawStarburst(ctx,cx,cy,s,et,time,formIdx*137+42);
  }else{
    const ct = easeInOutCubic(t);
    drawStarburst(ctx,cx,cy,s,1-ct,time,formIdx*137+42);
    if(ct>0.01) drawFuncs[nextIdx](ctx,cx,cy,s,ct,time);
  }

  // Edge glow during morph
  if(phase!=='hold'){
    const intensity = phase==='explode'?t:1-t;
    ctx.save();ctx.globalAlpha=intensity*0.25;
    const eg = ctx.createRadialGradient(cx,cy,s*0.12,cx,cy,s*0.55);
    eg.addColorStop(0,'rgba(100,120,200,0)');
    eg.addColorStop(0.6,'rgba(100,120,200,0)');
    eg.addColorStop(1,'rgba(140,170,255,0.7)');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(cx,cy,s*0.55,0,TAU);ctx.fill();
    ctx.restore();
  }

  // Particles
  const scale = w*0.75;
  particles.forEach(p=>{
    if(p.life<=0)return;
    const px2=cx+p.x*scale, py2=cy+p.y*scale, pS=p.size*scale;
    const pg = ctx.createRadialGradient(px2,py2,0,px2,py2,pS);
    pg.addColorStop(0,p.color.replace(')',`,${p.life})`).replace('rgba','rgba').replace('rgb(','rgba('));
    pg.addColorStop(1,'rgba(140,170,255,0)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(px2,py2,pS,0,TAU);ctx.fill();
  });
}

// ===== Animation Loop =====
const HOLD=2500, EXPLODE=500, CONVERGE=600, CYCLE=HOLD+EXPLODE+CONVERGE;
const shapeNames=['立方體','倒金字塔','球體'];
let lastTrans=-1;
const canvases=[{id:'main-canvas',w:360,h:360},{id:'nav-canvas',w:80,h:80},{id:'hero-canvas',w:260,h:260}];

function animate(ts) {
  const time=ts/1000, elapsed=ts%(CYCLE*3);
  const cycleIdx=Math.floor(elapsed/CYCLE), pos=elapsed-cycleIdx*CYCLE;
  const formIdx=cycleIdx%3, nextIdx=(formIdx+1)%3;
  let morphState, labelText;

  if(pos<HOLD){
    morphState={formIdx,phase:'hold',t:0};labelText=shapeNames[formIdx];
  }else if(pos<HOLD+EXPLODE){
    const t=(pos-HOLD)/EXPLODE;
    morphState={formIdx,phase:'explode',t};labelText='—';
    if(cycleIdx!==lastTrans){lastTrans=cycleIdx;spawnSpark(40);}
    if(Math.random()<0.4)spawnSpark(2);
  }else{
    const t=(pos-HOLD-EXPLODE)/CONVERGE;
    morphState={formIdx,phase:'converge',t};labelText=t>0.5?shapeNames[nextIdx]:'—';
  }

  updateParticles();
  const label=document.getElementById('form-label');
  label.textContent=labelText;label.style.opacity=labelText==='—'?'0.3':'1';
  canvases.forEach(({id,w,h})=>{
    const c=document.getElementById(id);if(!c)return;
    render(c.getContext('2d'),w,h,time,morphState);
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
