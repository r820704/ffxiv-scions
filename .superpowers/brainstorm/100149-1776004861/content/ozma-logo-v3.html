<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozma Logo v3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #12101c; color: #e8e0d0; font-family: 'Noto Sans TC', sans-serif; padding: 24px; }
  h1 { text-align: center; font-size: 1.3rem; color: #C5B69D; font-family: 'LXGW WenKai', serif; margin-bottom: 4px; }
  .page-sub { text-align: center; color: #6a5e4a; font-size: 0.8rem; margin-bottom: 32px; }
  .section-label { font-size: 0.75rem; color: #8a7e6a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }
  .showcase { display: flex; flex-direction: column; align-items: center; gap: 32px; max-width: 800px; margin: 0 auto; }

  /* ===== Ozma Container ===== */
  .ozma-container {
    position: relative;
    width: 160px; height: 160px;
  }
  .ozma-container.small { width: 32px; height: 32px; }
  .ozma-container.hero-size { width: 120px; height: 120px; }

  .ozma-container canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Float animation */
  .float { animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* Boxes */
  .anim-box { padding: 40px; background: #1a1528; border-radius: 12px; border: 1px solid #2a2440; width: 100%; text-align: center; }
  .navbar-demo { width: 100%; background: linear-gradient(180deg, #1a1528, #161220); border: 1px solid #2a2440; border-radius: 10px; padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden; }
  .navbar-demo::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #C5B69D40, transparent); }
  .nav-logo-text { font-family: 'LXGW WenKai', serif; font-size: 1rem; font-weight: 700; color: #C5B69D; }
  .nav-link { padding: 6px 14px; font-size: 0.82rem; color: #8a7e6a; border-radius: 6px; margin-left: 8px; }
  .nav-link.active { color: #C5B69D; background: #252040; }
  .hero-demo { text-align: center; padding: 40px 20px; background: #12101c; border: 1px solid #2a2440; border-radius: 10px; width: 100%; }
  .hero-title { font-family: 'LXGW WenKai', serif; font-size: 1.6rem; color: #C5B69D; margin-top: 16px; }
  .hero-sub { font-size: 0.85rem; color: #8a7e6a; margin-top: 4px; }
  .note { font-size: 0.72rem; color: #6a5e4a; line-height: 1.6; padding: 12px; background: #1a1528; border-radius: 6px; border-left: 3px solid #C5B69D; width: 100%; max-width: 600px; }
  #form-label { font-size: 0.8rem; color: #8a7e6a; margin-top: 12px; }
</style>
</head>
<body>

<h1>奧茲瑪 Logo — v3</h1>
<p class="page-sub">Canvas 2D 高精細繪製 + 型態變形 + 轉換特效</p>

<div class="showcase">

  <!-- Large animated -->
  <div class="anim-box">
    <div class="section-label">動畫效果</div>
    <div class="float">
      <div class="ozma-container">
        <canvas id="main-canvas" width="320" height="320"></canvas>
      </div>
    </div>
    <div id="form-label">立方體</div>
  </div>

  <!-- NavBar -->
  <div style="width:100%;">
    <div class="section-label">NavBar</div>
    <div class="navbar-demo">
      <div class="float">
        <div class="ozma-container small">
          <canvas id="nav-canvas" width="64" height="64"></canvas>
        </div>
      </div>
      <span class="nav-logo-text">FFXIV 工具箱</span>
      <span class="nav-link active">天氣查詢</span>
      <span class="nav-link">文理技能</span>
    </div>
  </div>

  <!-- Hero -->
  <div style="width:100%;">
    <div class="section-label">首頁 Hero</div>
    <div class="hero-demo">
      <div class="float">
        <div class="ozma-container hero-size">
          <canvas id="hero-canvas" width="240" height="240"></canvas>
        </div>
      </div>
      <div class="hero-title">FFXIV 工具箱</div>
      <div class="hero-sub">Final Fantasy XIV 繁中伺服器玩家工具</div>
    </div>
  </div>

  <div class="note">
    <strong style="color:#C5B69D;">v3 改進：</strong><br>
    • Canvas 2D 繪製，精細度大幅提升<br>
    • 三種型態有明確的形變動畫，不是淡入淡出<br>
    • 水晶面帶有漸層 + 內部反射光澤<br>
    • 轉換瞬間有粒子閃光特效<br>
    • 光環有旋轉的亮點 + 脈動呼吸<br>
    • 整體帶微浮動
  </div>
</div>

<script>
const BG = '#12101c';
const TAU = Math.PI * 2;

// ===== Shape Definitions =====
// Each shape defined as a function that returns vertices for interpolation
// All coordinates normalized to [-1, 1] range, centered at origin

// Cube (isometric view, tilted)
function cubeVertices(t) {
  // 3 visible faces of a cube in isometric projection
  const s = 0.55;
  return {
    top: [
      { x: 0, y: -s * 1.1 },
      { x: s, y: -s * 0.55 },
      { x: 0, y: 0 },
      { x: -s, y: -s * 0.55 },
    ],
    left: [
      { x: -s, y: -s * 0.55 },
      { x: 0, y: 0 },
      { x: 0, y: s * 0.7 },
      { x: -s, y: s * 0.15 },
    ],
    right: [
      { x: s, y: -s * 0.55 },
      { x: 0, y: 0 },
      { x: 0, y: s * 0.7 },
      { x: s, y: s * 0.15 },
    ],
    haloY: 0,
    highlightPos: { x: -0.12, y: -0.35 },
    highlightR: 0.06,
  };
}

// Inverted pyramid
function pyramidVertices(t) {
  const w = 0.6, h = 0.45;
  return {
    top: [
      { x: -w, y: -h },
      { x: w, y: -h },
      { x: w * 0.1, y: -h * 0.3 },
      { x: -w * 0.1, y: -h * 0.3 },
    ],
    left: [
      { x: -w, y: -h },
      { x: 0, y: -h * 0.3 },
      { x: 0, y: h * 0.95 },
      { x: -w * 0.5, y: h * 0.1 },
    ],
    right: [
      { x: w, y: -h },
      { x: 0, y: -h * 0.3 },
      { x: 0, y: h * 0.95 },
      { x: w * 0.5, y: h * 0.1 },
    ],
    haloY: -0.15,
    highlightPos: { x: -0.15, y: -0.2 },
    highlightR: 0.05,
  };
}

// Sphere (approximated with many-sided polygons)
function sphereVertices(t) {
  const r = 0.5;
  const n = 16;
  const top = [], left = [], right = [];

  // Top half arc
  for (let i = 0; i <= n; i++) {
    const a = Math.PI + (Math.PI * i / n);
    top.push({ x: r * Math.cos(a), y: r * Math.sin(a) * 0.95 });
  }
  // Bottom half - left
  for (let i = 0; i <= n / 2; i++) {
    const a = (Math.PI * i / (n / 2));
    left.push({ x: r * Math.cos(a), y: r * Math.sin(a) * 0.95 });
  }
  left.push({ x: 0, y: 0 });
  // Bottom half - right
  for (let i = 0; i <= n / 2; i++) {
    const a = Math.PI / 2 + (Math.PI * i / (n / 2));
    right.push({ x: r * Math.cos(a), y: r * Math.sin(a) * 0.95 });
  }
  right.push({ x: 0, y: 0 });

  return {
    top, left, right,
    haloY: 0.05,
    highlightPos: { x: -0.15, y: -0.18 },
    highlightR: 0.1,
  };
}

// ===== Interpolation =====
function resamplePath(pts, n) {
  if (pts.length === n) return pts.map(p => ({ ...p }));
  const result = [];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1) * (pts.length - 1);
    const idx = Math.min(Math.floor(t), pts.length - 2);
    const frac = t - idx;
    result.push({
      x: pts[idx].x + (pts[idx + 1].x - pts[idx].x) * frac,
      y: pts[idx].y + (pts[idx + 1].y - pts[idx].y) * frac,
    });
  }
  return result;
}

function lerpShapes(a, b, t) {
  const result = {};
  for (const key of ['top', 'left', 'right']) {
    const maxLen = Math.max(a[key].length, b[key].length, 12);
    const ra = resamplePath(a[key], maxLen);
    const rb = resamplePath(b[key], maxLen);
    result[key] = ra.map((p, i) => ({
      x: p.x + (rb[i].x - p.x) * t,
      y: p.y + (rb[i].y - p.y) * t,
    }));
  }
  result.haloY = a.haloY + (b.haloY - a.haloY) * t;
  result.highlightPos = {
    x: a.highlightPos.x + (b.highlightPos.x - a.highlightPos.x) * t,
    y: a.highlightPos.y + (b.highlightPos.y - a.highlightPos.y) * t,
  };
  result.highlightR = a.highlightR + (b.highlightR - a.highlightR) * t;
  return result;
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// ===== Rendering =====
function drawOzma(ctx, w, h, shape, time, particles) {
  const cx = w / 2, cy = h / 2;
  const scale = w * 0.8;

  ctx.clearRect(0, 0, w, h);

  // -- Background glow --
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.45);
  bgGrad.addColorStop(0, 'rgba(60, 70, 140, 0.12)');
  bgGrad.addColorStop(1, 'rgba(18, 16, 28, 0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // -- Halo ring (behind shape) --
  const haloY = cy + shape.haloY * scale * 0.5;
  drawHalo(ctx, cx, haloY, scale * 0.5, scale * 0.11, time);

  // -- Crystal body --
  // Left face (darker)
  drawFace(ctx, shape.left, cx, cy, scale, {
    fill: createFaceGradient(ctx, cx, cy, scale, '#4A70A8', '#253858', 0.75, 0.7),
    stroke: 'rgba(100, 140, 200, 0.5)',
  });
  // Right face (medium)
  drawFace(ctx, shape.right, cx, cy, scale, {
    fill: createFaceGradient(ctx, cx, cy, scale, '#5888C0', '#304868', 0.65, 0.6),
    stroke: 'rgba(100, 140, 200, 0.4)',
  });
  // Top face (brightest)
  drawFace(ctx, shape.top, cx, cy, scale, {
    fill: createFaceGradient(ctx, cx, cy, scale, '#90C8F0', '#5080B0', 0.85, 0.75),
    stroke: 'rgba(140, 180, 230, 0.6)',
  });

  // -- Inner reflection / refraction lines --
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#A0D8FF';
  ctx.lineWidth = w * 0.005;
  // Diagonal refraction line
  ctx.beginPath();
  ctx.moveTo(cx - scale * 0.15, cy - scale * 0.2);
  ctx.lineTo(cx + scale * 0.05, cy + scale * 0.15);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + scale * 0.1, cy - scale * 0.15);
  ctx.lineTo(cx + scale * 0.2, cy + scale * 0.1);
  ctx.stroke();
  ctx.restore();

  // -- Highlight / specular --
  const hlx = cx + shape.highlightPos.x * scale;
  const hly = cy + shape.highlightPos.y * scale;
  const hlr = shape.highlightR * scale;

  const hlGrad = ctx.createRadialGradient(hlx, hly, 0, hlx, hly, hlr * 2.5);
  hlGrad.addColorStop(0, 'rgba(220, 240, 255, 0.6)');
  hlGrad.addColorStop(0.3, 'rgba(180, 210, 255, 0.3)');
  hlGrad.addColorStop(1, 'rgba(180, 210, 255, 0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath();
  ctx.arc(hlx, hly, hlr * 2.5, 0, TAU);
  ctx.fill();

  // Small bright dot
  const dotGrad = ctx.createRadialGradient(hlx, hly, 0, hlx, hly, hlr);
  dotGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
  dotGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = dotGrad;
  ctx.beginPath();
  ctx.arc(hlx, hly, hlr, 0, TAU);
  ctx.fill();

  // -- Edge glow --
  ctx.save();
  ctx.globalAlpha = 0.1 + 0.05 * Math.sin(time * 2);
  const edgeGrad = ctx.createRadialGradient(cx, cy, scale * 0.2, cx, cy, scale * 0.55);
  edgeGrad.addColorStop(0, 'rgba(100, 140, 255, 0)');
  edgeGrad.addColorStop(0.8, 'rgba(100, 140, 255, 0)');
  edgeGrad.addColorStop(1, 'rgba(120, 160, 255, 0.5)');
  ctx.fillStyle = edgeGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, scale * 0.55, 0, TAU);
  ctx.fill();
  ctx.restore();

  // -- Particles --
  if (particles && particles.length > 0) {
    particles.forEach(p => {
      if (p.life <= 0) return;
      const alpha = p.life * 0.8;
      const pGrad = ctx.createRadialGradient(
        cx + p.x * scale, cy + p.y * scale, 0,
        cx + p.x * scale, cy + p.y * scale, p.size * scale
      );
      pGrad.addColorStop(0, `rgba(180, 200, 255, ${alpha})`);
      pGrad.addColorStop(0.5, `rgba(140, 170, 255, ${alpha * 0.5})`);
      pGrad.addColorStop(1, `rgba(140, 170, 255, 0)`);
      ctx.fillStyle = pGrad;
      ctx.beginPath();
      ctx.arc(cx + p.x * scale, cy + p.y * scale, p.size * scale, 0, TAU);
      ctx.fill();
    });
  }
}

function drawFace(ctx, pts, cx, cy, scale, style) {
  ctx.beginPath();
  pts.forEach((p, i) => {
    const x = cx + p.x * scale;
    const y = cy + p.y * scale;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = style.fill;
  ctx.fill();
  ctx.strokeStyle = style.stroke;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function createFaceGradient(ctx, cx, cy, scale, colorLight, colorDark, opLight, opDark) {
  const grad = ctx.createLinearGradient(cx - scale * 0.3, cy - scale * 0.4, cx + scale * 0.3, cy + scale * 0.4);
  grad.addColorStop(0, hexToRgba(colorLight, opLight));
  grad.addColorStop(1, hexToRgba(colorDark, opDark));
  return grad;
}

function drawHalo(ctx, cx, cy, rx, ry, time) {
  ctx.save();

  // Main ellipse glow
  const pulse = 0.6 + 0.3 * Math.sin(time * 1.5);
  ctx.globalAlpha = pulse;

  // Outer glow
  ctx.strokeStyle = 'rgba(130, 140, 255, 0.4)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx * 1.05, ry * 1.05, 0, 0, TAU);
  ctx.stroke();

  // Main ring
  ctx.globalAlpha = pulse * 1.2;
  ctx.strokeStyle = 'rgba(160, 170, 255, 0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, TAU);
  ctx.stroke();

  // Inner bright line
  ctx.globalAlpha = pulse * 0.8;
  ctx.strokeStyle = 'rgba(200, 210, 255, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx * 0.97, ry * 0.97, 0, 0, TAU);
  ctx.stroke();

  // Rotating bright spots on halo
  const spotAngle1 = time * 0.8;
  const spotAngle2 = time * 0.8 + Math.PI;
  for (const angle of [spotAngle1, spotAngle2]) {
    const sx = cx + rx * Math.cos(angle);
    const sy = cy + ry * Math.sin(angle);
    const spotGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, rx * 0.12);
    spotGrad.addColorStop(0, 'rgba(200, 210, 255, 0.9)');
    spotGrad.addColorStop(0.4, 'rgba(160, 180, 255, 0.5)');
    spotGrad.addColorStop(1, 'rgba(140, 160, 255, 0)');
    ctx.globalAlpha = pulse;
    ctx.fillStyle = spotGrad;
    ctx.beginPath();
    ctx.arc(sx, sy, rx * 0.12, 0, TAU);
    ctx.fill();
  }

  ctx.restore();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ===== Animation State =====
const shapeFuncs = [cubeVertices, pyramidVertices, sphereVertices];
const shapeNames = ['立方體', '倒金字塔', '球體'];
const HOLD = 2500;
const MORPH = 1000;
const CYCLE = HOLD + MORPH;

let particles = [];

function spawnParticles() {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * TAU;
    const speed = 0.003 + Math.random() * 0.005;
    particles.push({
      x: (Math.random() - 0.5) * 0.3,
      y: (Math.random() - 0.5) * 0.3,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      size: 0.02 + Math.random() * 0.03,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.size *= 0.995;
  });
}

let lastMorphTriggered = -1;

// Canvas list
const canvases = [
  { id: 'main-canvas', w: 320, h: 320 },
  { id: 'nav-canvas', w: 64, h: 64 },
  { id: 'hero-canvas', w: 240, h: 240 },
];

function animate(timestamp) {
  const time = timestamp / 1000;
  const elapsed = timestamp % (CYCLE * 3);
  const cycleIdx = Math.floor(elapsed / CYCLE);
  const posInCycle = elapsed - cycleIdx * CYCLE;

  const fromIdx = cycleIdx % 3;
  const toIdx = (cycleIdx + 1) % 3;

  let shape, labelText;

  if (posInCycle < HOLD) {
    shape = shapeFuncs[fromIdx]();
    labelText = shapeNames[fromIdx];
  } else {
    const rawT = (posInCycle - HOLD) / MORPH;
    const t = easeInOutCubic(rawT);
    shape = lerpShapes(shapeFuncs[fromIdx](), shapeFuncs[toIdx](), t);
    labelText = rawT > 0.5 ? shapeNames[toIdx] : shapeNames[fromIdx];

    // Spawn particles at start of morph
    const morphId = cycleIdx;
    if (morphId !== lastMorphTriggered) {
      lastMorphTriggered = morphId;
      spawnParticles();
    }
  }

  updateParticles();

  document.getElementById('form-label').textContent = labelText;

  canvases.forEach(({ id, w, h }) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    drawOzma(ctx, w, h, shape, time, particles);
  });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
