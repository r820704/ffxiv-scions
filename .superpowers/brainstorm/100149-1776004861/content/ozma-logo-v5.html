<body>
<h1>奧茲瑪 Logo — v5</h1>
<p class="page-sub">各形態獨立高品質繪製 + 星芒整體崩壞過渡</p>
<div class="showcase">
  <div class="anim-box">
    <div class="section-label">動畫效果</div>
    <div class="float"><canvas id="main-canvas" width="320" height="320" style="width:160px;height:160px;"></canvas></div>

  </div>
  <div style="width:100%;">
    <div class="section-label">NavBar</div>

  <div class="note">
    <strong style="color:#C5B69D;">v5 改進：</strong><br>
    • 每個形態獨立繪製，不再共用頂點系統<br>
    • 立方體：等距投影三面，清晰透明漸層<br>
    • 球體：圓潤球形 + 旋轉紋理 + 赤道光環<br>
    • 倒金字塔：銳利三面 + 頂面高光<br>
    • 中間態：整體變形為不規則星芒多面體（非粒子化）<br>
    • 粒子只作為裝飾閃光，不是主體

<script>
const TAU = Math.PI * 2;

// ===== Particles (decorative only) =====
let particles = [];
function spawnSpark(count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU;
    const sp = 0.003 + Math.random() * 0.008;
    particles.push({ x: (Math.random()-0.5)*0.1, y: (Math.random()-0.5)*0.1,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 1, decay: 0.01+Math.random()*0.015, size: 0.01+Math.random()*0.025 });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; });
}

// ===== Halo =====
function drawHalo(ctx, cx, cy, rx, ry, time, intensity) {
  const pulse = 0.5 + 0.35 * Math.sin(time * 1.5);
  const I = pulse * intensity;
  ctx.save();
  // Soft outer
  ctx.globalAlpha = I * 0.4;
  ctx.strokeStyle = 'rgba(130,140,255,0.5)';
  ctx.lineWidth = rx * 0.08;
  ctx.beginPath(); ctx.ellipse(cx, cy, rx*1.04, ry*1.04, 0, 0, TAU); ctx.stroke();
  // Main ring
  ctx.globalAlpha = I * 0.8;
  ctx.strokeStyle = 'rgba(180,190,255,0.8)';
  ctx.lineWidth = rx * 0.03;
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, TAU); ctx.stroke();
  // Rotating spots
  for (const offset of [0, Math.PI]) {
    const a = time * 0.9 + offset;
    const sx = cx + rx * Math.cos(a), sy = cy + ry * Math.sin(a);
    const g = ctx.createRadialGradient(sx,sy,0,sx,sy,rx*0.1);
    g.addColorStop(0, `rgba(220,230,255,${I})`);
    g.addColorStop(0.4, `rgba(180,200,255,${I*0.5})`);
    g.addColorStop(1, 'rgba(140,160,255,0)');
    ctx.globalAlpha = I;
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sx, sy, rx*0.1, 0, TAU); ctx.fill();
  }
  ctx.restore();
}

// ===== Draw Cube =====
function drawCube(ctx, cx, cy, s, alpha, time) {
  const w = s * 0.38;
  const h = s * 0.55;
  // Taller isometric cube - top vertex high, bottom vertex low
  // Top face
  const top = [{x:cx,y:cy-h*1.0},{x:cx+w,y:cy-h*0.45},{x:cx,y:cy+h*0.05},{x:cx-w,y:cy-h*0.45}];
  // Left face
  const left = [{x:cx-w,y:cy-h*0.45},{x:cx,y:cy+h*0.05},{x:cx,y:cy+h*0.85},{x:cx-w,y:cy+h*0.35}];
  // Right face
  const right = [{x:cx+w,y:cy-h*0.45},{x:cx,y:cy+h*0.05},{x:cx,y:cy+h*0.85},{x:cx+w,y:cy+h*0.35}];

  ctx.save();
  ctx.globalAlpha = alpha;

  // Left face (darkest)
  let g = ctx.createLinearGradient(cx-w, cy-h*0.5, cx, cy+h);
  g.addColorStop(0, 'rgba(60,95,150,0.75)');
  g.addColorStop(1, 'rgba(30,55,95,0.65)');
  drawPoly(ctx, left, g, 'rgba(90,130,190,0.4)');

  // Right face (medium)
  g = ctx.createLinearGradient(cx+w, cy-h*0.5, cx, cy+h);
  g.addColorStop(0, 'rgba(75,115,175,0.7)');
  g.addColorStop(1, 'rgba(40,70,120,0.6)');
  drawPoly(ctx, right, g, 'rgba(100,140,200,0.35)');

  // Top face (brightest)
  g = ctx.createLinearGradient(cx, cy-h*1.4, cx, cy+h*0.1);
  g.addColorStop(0, 'rgba(160,210,255,0.85)');
  g.addColorStop(0.5, 'rgba(120,175,235,0.75)');
  g.addColorStop(1, 'rgba(90,145,210,0.7)');
  drawPoly(ctx, top, g, 'rgba(140,180,230,0.5)');

  // Inner reflection on left face
  ctx.globalAlpha = alpha * 0.15;
  g = ctx.createLinearGradient(cx-w*0.8, cy, cx-w*0.2, cy+h*0.5);
  g.addColorStop(0, '#A0E0F0');
  g.addColorStop(1, 'transparent');
  drawPoly(ctx, [{x:cx-w*0.7,y:cy-h*0.2},{x:cx-w*0.15,y:cy+h*0.05},{x:cx-w*0.15,y:cy+h*0.6},{x:cx-w*0.7,y:cy+h*0.15}], g);

  // Animated shimmer across top face
  const shimmerX = cx + Math.sin(time * 1.2) * w * 0.6;
  const shimmerY = cy - h * 0.7 + Math.cos(time * 0.8) * h * 0.15;
  ctx.globalAlpha = alpha * 0.35;
  const shimG = ctx.createRadialGradient(shimmerX, shimmerY, 0, shimmerX, shimmerY, s*0.1);
  shimG.addColorStop(0, 'rgba(255,255,255,0.9)');
  shimG.addColorStop(0.3, 'rgba(220,240,255,0.4)');
  shimG.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = shimG;
  ctx.beginPath(); ctx.arc(shimmerX, shimmerY, s*0.1, 0, TAU); ctx.fill();

  // Main specular
  ctx.globalAlpha = alpha * 0.65;
  const hlG = ctx.createRadialGradient(cx-w*0.15, cy-h*0.65, 0, cx-w*0.15, cy-h*0.65, s*0.15);
  hlG.addColorStop(0, 'rgba(255,255,255,0.9)');
  hlG.addColorStop(0.3, 'rgba(230,245,255,0.5)');
  hlG.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = hlG;
  ctx.beginPath(); ctx.arc(cx-w*0.15, cy-h*0.65, s*0.15, 0, TAU); ctx.fill();

  // Edge highlight on top-right edge
  ctx.globalAlpha = alpha * 0.3;
  ctx.strokeStyle = 'rgba(200,230,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, cy-h*1.0); ctx.lineTo(cx+w, cy-h*0.45); ctx.stroke();

  ctx.restore();
}

// ===== Draw Pyramid (inverted) =====
function drawPyramid(ctx, cx, cy, s, alpha, time) {
  const w = s * 0.55;
  const topY = cy - s * 0.32;
  const botY = cy + s * 0.5;
  const midY = topY + (botY - topY) * 0.15;

  // Top face
  const top = [{x:cx-w,y:topY},{x:cx+w,y:topY},{x:cx+w*0.08,y:midY},{x:cx-w*0.08,y:midY}];
  // Left face
  const left = [{x:cx-w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];
  // Right face
  const right = [{x:cx+w,y:topY},{x:cx,y:midY},{x:cx,y:botY}];

  ctx.save();
  ctx.globalAlpha = alpha;

  // Left face
  let g = ctx.createLinearGradient(cx-w, topY, cx, botY);
  g.addColorStop(0, 'rgba(100,155,220,0.8)');
  g.addColorStop(1, 'rgba(35,65,110,0.65)');
  drawPoly(ctx, left, g, 'rgba(90,140,200,0.4)');

  // Right face
  g = ctx.createLinearGradient(cx+w, topY, cx, botY);
  g.addColorStop(0, 'rgba(80,130,195,0.7)');
  g.addColorStop(1, 'rgba(28,55,95,0.6)');
  drawPoly(ctx, right, g, 'rgba(80,120,180,0.35)');

  // Top face
  g = ctx.createLinearGradient(cx, topY, cx, midY);
  g.addColorStop(0, 'rgba(170,215,255,0.9)');
  g.addColorStop(1, 'rgba(120,175,240,0.75)');
  drawPoly(ctx, top, g, 'rgba(150,190,240,0.5)');

  // Inner refraction
  ctx.globalAlpha = alpha * 0.15;
  ctx.strokeStyle = '#A0D8FF';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx-w*0.4, topY+10); ctx.lineTo(cx, botY-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+w*0.3, topY+10); ctx.lineTo(cx, botY-20); ctx.stroke();

  // Specular on top face
  ctx.globalAlpha = alpha * 0.6;
  const hlG = ctx.createRadialGradient(cx-w*0.25, topY+6, 0, cx-w*0.25, topY+6, s*0.12);
  hlG.addColorStop(0, 'rgba(255,255,255,0.9)');
  hlG.addColorStop(0.3, 'rgba(230,245,255,0.4)');
  hlG.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = hlG;
  ctx.beginPath(); ctx.arc(cx-w*0.25, topY+6, s*0.12, 0, TAU); ctx.fill();

  // Animated shimmer down the left face
  const pyrShimY = topY + (botY - topY) * (0.3 + 0.25 * Math.sin(time * 1.0));
  const pyrShimX = cx - w * 0.3 + (botY - pyrShimY) / (botY - topY) * w * 0.3;
  ctx.globalAlpha = alpha * 0.3;
  const pyrShim = ctx.createRadialGradient(pyrShimX, pyrShimY, 0, pyrShimX, pyrShimY, s*0.08);
  pyrShim.addColorStop(0, 'rgba(255,255,255,0.8)');
  pyrShim.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = pyrShim;
  ctx.beginPath(); ctx.arc(pyrShimX, pyrShimY, s*0.08, 0, TAU); ctx.fill();

  // Top edge highlight
  ctx.globalAlpha = alpha * 0.4;
  ctx.strokeStyle = 'rgba(220,240,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx-w, topY); ctx.lineTo(cx+w, topY); ctx.stroke();

  // Side edge highlights
  ctx.globalAlpha = alpha * 0.2;
  ctx.beginPath(); ctx.moveTo(cx-w, topY); ctx.lineTo(cx, botY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+w, topY); ctx.lineTo(cx, botY); ctx.stroke();

  ctx.restore();
}

// ===== Draw Sphere =====
function drawSphere(ctx, cx, cy, s, alpha, time) {
  const r = s * 0.42;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Main sphere body
  const g = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.05, cx, cy, r);
  g.addColorStop(0, 'rgba(190,225,255,0.9)');
  g.addColorStop(0.3, 'rgba(120,175,235,0.8)');
  g.addColorStop(0.7, 'rgba(70,120,190,0.75)');
  g.addColorStop(1, 'rgba(35,65,130,0.7)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();

  // Outline
  ctx.strokeStyle = 'rgba(100,150,220,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.stroke();

  // Swirl patterns (marble texture, rotating)
  ctx.save();
  ctx.globalAlpha = alpha * 0.18;
  ctx.beginPath(); ctx.arc(cx, cy, r-1, 0, TAU); ctx.clip();

  const swirlT = time * 0.3;
  for (let i = 0; i < 4; i++) {
    const angle = swirlT + i * 1.5;
    const sx = cx + r * 0.3 * Math.cos(angle);
    const sy = cy + r * 0.15 * Math.sin(angle * 0.7);
    ctx.strokeStyle = i % 2 === 0 ? '#C0E0FF' : '#80B0E0';
    ctx.lineWidth = 2 + i;
    ctx.beginPath();
    ctx.moveTo(sx - r*0.5, sy - r*0.15);
    ctx.bezierCurveTo(sx - r*0.2, sy + r*0.2, sx + r*0.2, sy - r*0.2, sx + r*0.5, sy + r*0.1);
    ctx.stroke();
  }
  ctx.restore();

  // Equator ring
  ctx.save();
  ctx.globalAlpha = alpha * 0.3;
  ctx.strokeStyle = 'rgba(160,200,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(cx, cy + r*0.05, r*0.97, r*0.18, 0, 0, TAU); ctx.stroke();
  ctx.restore();

  // Specular highlight
  ctx.globalAlpha = alpha * 0.6;
  const hlG = ctx.createRadialGradient(cx-r*0.35, cy-r*0.35, 0, cx-r*0.35, cy-r*0.35, r*0.35);
  hlG.addColorStop(0, 'rgba(250,255,255,0.8)');
  hlG.addColorStop(0.3, 'rgba(220,240,255,0.4)');
  hlG.addColorStop(1, 'rgba(220,240,255,0)');
  ctx.fillStyle = hlG;
  ctx.beginPath(); ctx.arc(cx-r*0.35, cy-r*0.35, r*0.35, 0, TAU); ctx.fill();

  // Small bright dot
  ctx.globalAlpha = alpha * 0.85;
  const dotG = ctx.createRadialGradient(cx-r*0.28, cy-r*0.38, 0, cx-r*0.28, cy-r*0.38, r*0.1);
  dotG.addColorStop(0, 'rgba(255,255,255,1)');
  dotG.addColorStop(0.3, 'rgba(255,255,255,0.5)');
  dotG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = dotG;
  ctx.beginPath(); ctx.arc(cx-r*0.28, cy-r*0.38, r*0.1, 0, TAU); ctx.fill();

  // Secondary specular (bottom right, subtle)
  ctx.globalAlpha = alpha * 0.2;
  const secG = ctx.createRadialGradient(cx+r*0.2, cy+r*0.15, 0, cx+r*0.2, cy+r*0.15, r*0.15);
  secG.addColorStop(0, 'rgba(200,230,255,0.6)');
  secG.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = secG;
  ctx.beginPath(); ctx.arc(cx+r*0.2, cy+r*0.15, r*0.15, 0, TAU); ctx.fill();

  // Animated shimmer moving across sphere
  const sphShimAngle = time * 0.7;
  const sphShimX = cx + r * 0.3 * Math.cos(sphShimAngle);
  const sphShimY = cy + r * 0.15 * Math.sin(sphShimAngle * 0.6);
  ctx.globalAlpha = alpha * 0.3;
  const sphShim = ctx.createRadialGradient(sphShimX, sphShimY, 0, sphShimX, sphShimY, r*0.18);
  sphShim.addColorStop(0, 'rgba(255,255,255,0.7)');
  sphShim.addColorStop(0.4, 'rgba(220,240,255,0.3)');
  sphShim.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = sphShim;
  ctx.beginPath(); ctx.arc(sphShimX, sphShimY, r*0.18, 0, TAU); ctx.fill();

  // Rim light (edge glow)
  ctx.globalAlpha = alpha * 0.25;
  ctx.strokeStyle = 'rgba(180,210,255,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r - 1, -0.8, 0.8); ctx.stroke();

  ctx.restore();
}

// ===== Draw Starburst (intermediate collapse) =====
function drawStarburst(ctx, cx, cy, s, alpha, time, seed) {
  const rng = mulberry32(seed);
  const spikes = 10 + Math.floor(rng() * 4);
  const pts = [];

  for (let i = 0; i < spikes; i++) {
    const a = TAU * i / spikes + (rng() - 0.5) * 0.3;
    const outerR = s * (0.35 + rng() * 0.25);
    const innerR = s * (0.08 + rng() * 0.1);
    pts.push({ x: cx + outerR * Math.cos(a), y: cy + outerR * Math.sin(a) });
    const a2 = a + TAU / spikes * 0.5;
    pts.push({ x: cx + innerR * Math.cos(a2), y: cy + innerR * Math.sin(a2) });
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  // Fill with crystal gradient
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, s*0.5);
  g.addColorStop(0, 'rgba(180,220,255,0.85)');
  g.addColorStop(0.4, 'rgba(100,155,230,0.7)');
  g.addColorStop(1, 'rgba(50,85,160,0.5)');

  ctx.fillStyle = g;
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.fill();

  // Edge glow
  ctx.strokeStyle = 'rgba(150,190,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner bright core
  const coreG = ctx.createRadialGradient(cx, cy, 0, cx, cy, s*0.2);
  coreG.addColorStop(0, 'rgba(255,255,255,0.95)');
  coreG.addColorStop(0.2, 'rgba(220,240,255,0.7)');
  coreG.addColorStop(1, 'rgba(180,210,255,0)');
  ctx.fillStyle = coreG;
  ctx.beginPath(); ctx.arc(cx, cy, s*0.2, 0, TAU); ctx.fill();

  // Shimmer on spike tips
  ctx.globalAlpha = alpha * 0.5;
  for (let i = 0; i < pts.length; i += 2) {
    const tipG = ctx.createRadialGradient(pts[i].x, pts[i].y, 0, pts[i].x, pts[i].y, s*0.04);
    tipG.addColorStop(0, 'rgba(255,255,255,0.8)');
    tipG.addColorStop(1, 'rgba(200,230,255,0)');
    ctx.fillStyle = tipG;
    ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, s*0.04, 0, TAU); ctx.fill();
  }

  ctx.restore();
}

function drawPoly(ctx, pts, fill, stroke) {
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
}

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function easeOutExpo(t) { return t===1?1:1-Math.pow(2,-10*t); }
function easeInOutCubic(t) { return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

// ===== Main Render =====
function render(ctx, w, h, time, morphState) {
  const cx = w/2, cy = h/2, s = w * 0.8;
  ctx.clearRect(0, 0, w, h);

  // Ambient glow
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, w*0.45);
  bg.addColorStop(0, 'rgba(60,70,140,0.12)');
  bg.addColorStop(1, 'rgba(18,16,28,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  const { formIdx, phase, t } = morphState;
  // phase: 'hold' | 'explode' | 'converge'
  const drawFuncs = [drawCube, drawPyramid, drawSphere];
  const nextIdx = (formIdx + 1) % 3;
  const haloIntensity = phase === 'hold' ? 1 : (phase === 'explode' ? 1 + t*0.6 : 1.6 - t*0.6);

  // Halo (behind everything)
  drawHalo(ctx, cx, cy, w*0.42, w*0.1, time, haloIntensity);

  if (phase === 'hold') {
    drawFuncs[formIdx](ctx, cx, cy, s, 1, time);
  } else if (phase === 'explode') {
    // Crossfade: current form fades out, starburst fades in
    const et = easeOutExpo(t);
    const formAlpha = 1 - et;
    const starAlpha = et;
    if (formAlpha > 0.01) drawFuncs[formIdx](ctx, cx, cy, s, formAlpha, time);
    drawStarburst(ctx, cx, cy, s, starAlpha, time, formIdx * 137 + 42);
  } else {
    // Converge: starburst fades out, new form fades in
    const ct = easeInOutCubic(t);
    const starAlpha = 1 - ct;
    const formAlpha = ct;
    drawStarburst(ctx, cx, cy, s, starAlpha, time, formIdx * 137 + 42);
    if (formAlpha > 0.01) drawFuncs[nextIdx](ctx, cx, cy, s, formAlpha, time);
  }

  // Edge glow pulse (extra during morph)
  if (phase !== 'hold') {
    const intensity = phase === 'explode' ? t : 1 - t;
    ctx.save();
    ctx.globalAlpha = intensity * 0.2;
    const eg = ctx.createRadialGradient(cx, cy, s*0.15, cx, cy, s*0.55);
    eg.addColorStop(0, 'rgba(120,160,255,0)');
    eg.addColorStop(0.6, 'rgba(120,160,255,0)');
    eg.addColorStop(1, 'rgba(140,180,255,0.8)');
    ctx.fillStyle = eg;
    ctx.beginPath(); ctx.arc(cx, cy, s*0.55, 0, TAU); ctx.fill();
    ctx.restore();
  }

  // Particles (decorative)
  const scale = w * 0.75;
  particles.forEach(p => {
    if (p.life <= 0) return;
    const px2 = cx + p.x * scale, py2 = cy + p.y * scale;
    const pSize = p.size * scale;
    const pg = ctx.createRadialGradient(px2, py2, 0, px2, py2, pSize);
    pg.addColorStop(0, `rgba(210,230,255,${p.life})`);
    pg.addColorStop(0.4, `rgba(170,200,255,${p.life*0.5})`);
    pg.addColorStop(1, 'rgba(140,170,255,0)');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(px2, py2, pSize, 0, TAU); ctx.fill();
  });
}

// ===== Animation =====
const HOLD = 2500;
const EXPLODE = 500;
const CONVERGE = 600;
const CYCLE = HOLD + EXPLODE + CONVERGE;
const shapeNames = ['立方體', '倒金字塔', '球體'];

let lastTransitionId = -1;
const canvases = [
  { id: 'main-canvas', w: 320, h: 320 },
  { id: 'nav-canvas', w: 80, h: 80 },
  { id: 'hero-canvas', w: 240, h: 240 },
];

function animate(timestamp) {
  const time = timestamp / 1000;
  const elapsed = timestamp % (CYCLE * 3);
  const cycleIdx = Math.floor(elapsed / CYCLE);
  const posInCycle = elapsed - cycleIdx * CYCLE;
  const formIdx = cycleIdx % 3;
  const nextIdx = (formIdx + 1) % 3;

  let morphState, labelText;

  if (posInCycle < HOLD) {
    morphState = { formIdx, phase: 'hold', t: 0 };
    labelText = shapeNames[formIdx];
  } else if (posInCycle < HOLD + EXPLODE) {
    const t = (posInCycle - HOLD) / EXPLODE;
    morphState = { formIdx, phase: 'explode', t };
    labelText = '—';
    if (cycleIdx !== lastTransitionId) {
      lastTransitionId = cycleIdx;
      spawnSpark(35);
    }
    if (Math.random() < 0.35) spawnSpark(2);
  } else {
    const t = (posInCycle - HOLD - EXPLODE) / CONVERGE;
    morphState = { formIdx, phase: 'converge', t };
    labelText = t > 0.5 ? shapeNames[nextIdx] : '—';
    if (t < 0.3 && Math.random() < 0.3) spawnSpark(1);
  }

  updateParticles();

  const label = document.getElementById('form-label');
  label.textContent = labelText;
  label.style.opacity = labelText === '—' ? '0.3' : '1';

  canvases.forEach(({ id, w, h }) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    render(canvas.getContext('2d'), w, h, time, morphState);
  });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
